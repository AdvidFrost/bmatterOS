  <!-- WebView2 polyfill: reply to wrapper-init so runtime doesn't hang -->
  <script>
  (function(){
    if(!window.chrome)window.chrome={};
    if(!window.chrome.webview){
      var L={};
      window.chrome.webview={
        addEventListener:function(t,f){L[t]=f;},
        removeEventListener:function(){},
        postMessage:function(s){
          try{var m=JSON.parse(s);if(m.type==='wrapper-init'&&L.message)setTimeout(function(){L.message({data:{type:'wrapper-init-response',registeredComponentIds:[]},additionalObjects:null});},0);}catch(e){}
        }
      };
    }

<script>
// ── Speed: timestamp scaling — one RAF per frame, just advance virtual time faster/slower ──
var _spd = 1, _vt = null, _lr = null, _paused = false, _stepOnce = false;
var _oRAF = window.requestAnimationFrame.bind(window);
var _oCAF = window.cancelAnimationFrame.bind(window);

window.requestAnimationFrame = function(cb){
  return _oRAF(function(real){
    if(_paused && !_stepOnce){ window.requestAnimationFrame(cb); return; }
    _stepOnce = false;
    if(_spd === 1){ _vt=null; _lr=null; cb(real); return; }
    if(_vt===null){ _vt=real; _lr=real; }
    var d = real-_lr; _lr=real;
    _vt += d*_spd;
    cb(_vt);
  });
};
window.cancelAnimationFrame = _oCAF;

function bmosSpeed(s,id){
  _spd=s; _vt=null; _lr=null;
  document.querySelectorAll('[id^="bs"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
}

function bmosPause(){
  _paused=!_paused;
  var b=document.getElementById('bpause');
  b.textContent=_paused?'▶ Resume':'⏸ Pause';
  b.classList.toggle('on',_paused);
}
function bmosStep(){ _stepOnce=true; }

// ── Filters via MutationObserver — apply once, re-apply if new canvases added ──
var _fx='', _zoom=1;
function bmosApplyFx(){
  document.querySelectorAll('canvas').forEach(function(c){
    c.style.filter=_fx;
    c.style.transform=_zoom===1?'':'scale('+_zoom+')';
    c.style.transformOrigin='center center';
  });
}
// watch for canvases added dynamically (Construct creates them after load)
new MutationObserver(bmosApplyFx).observe(document.body,{childList:true,subtree:true});

function bmosFx(f,id){
  _fx=f;
  document.querySelectorAll('[id^="bf"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  bmosApplyFx();
}
function bmosZoom(f){ _zoom=Math.min(3,Math.max(0.2,_zoom*f)); bmosApplyFx(); }
function bmosZoomReset(){ _zoom=1; bmosApplyFx(); }

function bmosFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen().catch(function(){});
}

function bmosScreenshot(){
  var c=document.querySelector('canvas');
  if(!c){bmosLog('No canvas yet — launch game first');return;}
  try{var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='cobb-'+Date.now()+'.png';a.click();}
  catch(e){bmosLog('Shot failed: '+e.message);}
}

// ── Runtime accessor ──────────────────────────────────────────────────────────
function bmosRT(){ return window.c3_runtimeInterface&&window.c3_runtimeInterface._localRuntime; }

function bmosGetTypes(){
  var rt=bmosRT(); if(!rt) return null;
  // C3 stores object types in _objectTypes (Map) or similar
  return rt._objectTypes||rt._objectTypesByName||null;
}

function bmosGetInsts(nameHint){
  var types=bmosGetTypes(); if(!types) return [];
  var out=[];
  types.forEach(function(t){
    var n=(t._name||t.name||'').toLowerCase();
    if(!nameHint||n.includes(nameHint.toLowerCase())){
      var arr=t._instances||t.instances||[];
      arr.forEach(function(i){ out.push({type:t,inst:i,name:n}); });
    }
  });
  return out;
}

function bmosLog(msg){ document.getElementById('bmos-log').textContent='> '+msg; }

// ── Object hacks ─────────────────────────────────────────────────────────────
function bmosHack(cmd){
  var rt=bmosRT();
  if(cmd==='list_objs'){
    var types=bmosGetTypes();
    if(!types){ bmosLog('Runtime not ready yet'); return; }
    var names=[];
    types.forEach(function(t){ names.push(t._name||t.name||'?'); });
    document.getElementById('bmos-objs').textContent=names.join(', ')||'(none found)';
    bmosLog('Found '+names.length+' types');
    return;
  }

  if(cmd==='spawn_coal'){
    // find coal-ish object, clone near player
    var cobbs=bmosGetInsts('cobb');
    if(!cobbs.length) cobbs=bmosGetInsts('player');
    var px=200,py=200;
    if(cobbs.length){ px=cobbs[0].inst._x||cobbs[0].inst.x||px; py=cobbs[0].inst._y||cobbs[0].inst.y||py; }
    var coals=bmosGetInsts('coal');
    if(!coals.length) coals=bmosGetInsts('rock');
    if(!coals.length) coals=bmosGetInsts('obstacle');
    if(!coals.length){ bmosLog('Coal object not found — use List Objs'); return; }
    try{
      var src=coals[0].inst;
      var layout=rt._currentLayout||rt.layout;
      var layer=layout._layers[0];
      var type=coals[0].type;
      var ni=rt.CreateWorldInstance?rt.CreateWorldInstance(type,layer,px+80,py):
               rt._CreateInstance?rt._CreateInstance(type,layer,px+80,py):null;
      if(ni) bmosLog('Coal spawned!'); else bmosLog('Spawn API not found');
    }catch(e){ bmosLog('Spawn failed: '+e.message); }
    return;
  }

  if(cmd==='dupe_cobb'){
    var insts=bmosGetInsts('cobb');
    if(!insts.length) insts=bmosGetInsts('player');
    if(!insts.length){ bmosLog('Cobb not found — use List Objs'); return; }
    try{
      var src=insts[0].inst;
      var layout=rt._currentLayout||rt.layout;
      var layer=layout._layers[0];
      var type=insts[0].type;
      var px=(src._x||src.x||100)+60;
      var py=src._y||src.y||100;
      var ni=rt.CreateWorldInstance?rt.CreateWorldInstance(type,layer,px,py):
               rt._CreateInstance?rt._CreateInstance(type,layer,px,py):null;
      if(ni) bmosLog('Cobb duped!'); else bmosLog('Create API not found — use List Objs for clues');
    }catch(e){ bmosLog('Dupe failed: '+e.message); }
    return;
  }

  if(cmd==='giant'||cmd==='tiny'||cmd==='reset_size'){
    var insts=bmosGetInsts('cobb');
    if(!insts.length) insts=bmosGetInsts('player');
    if(!insts.length){ bmosLog('Cobb not found'); return; }
    var scale=cmd==='giant'?3:cmd==='tiny'?0.35:1;
    var changed=0;
    insts.forEach(function(o){
      var i=o.inst;
      try{
        if(i.SetSize){ var w=i._width||i.width||32,h=i._height||i.height||32; i.SetSize(w*scale,h*scale); changed++; }
        else if(i._width!==undefined){ i._width=(i._origW||32)*scale; i._height=(i._origH||32)*scale; changed++; }
      }catch(e){}
    });
    bmosLog(changed?'Size changed!':'SetSize not accessible');
    return;
  }

  if(cmd==='tp_spawn'){
    var insts=bmosGetInsts('cobb');
    if(!insts.length) insts=bmosGetInsts('player');
    if(!insts.length){ bmosLog('Cobb not found'); return; }
    insts.forEach(function(o){
      var i=o.inst;
      try{ if(i.SetX){ i.SetX(100); i.SetY(100); } else { i._x=100; i._y=100; } }catch(e){}
    });
    bmosLog('Teleported to spawn area');
    return;
  }

  if(cmd==='kill_all'){
    // destroy all non-player/non-cobb instances
    var all=bmosGetInsts();
    var killed=0;
    all.forEach(function(o){
      var n=o.name;
      if(n.includes('cobb')||n.includes('player')||n.includes('ui')||n.includes('hud')) return;
      try{ if(o.inst.Destroy){ o.inst.Destroy(); killed++; } }catch(e){}
    });
    bmosLog('Destroyed '+killed+' objects');
    return;
  }
}

// ── Menu open/close ───────────────────────────────────────────────────────────
function bmosOpen(){ document.getElementById('bmos-menu').classList.add('open'); }
function bmosClose(){ document.getElementById('bmos-menu').classList.remove('open'); }
document.addEventListener('keydown',function(e){
  if(e.key==='m'||e.key==='M'){ var m=document.getElementById('bmos-menu'); m.classList.contains('open')?bmosClose():bmosOpen(); }
  if(e.key==='Escape') bmosClose();
});
</script>
