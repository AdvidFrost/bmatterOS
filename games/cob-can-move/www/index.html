<script>
// ── Speed: timestamp scaling (one RAF per frame, zero extra engine ticks) ─────
var _spd=1, _vt=null, _lr=null, _paused=false, _stepOnce=false;
var _oRAF=window.requestAnimationFrame.bind(window);
window.requestAnimationFrame=function(cb){
  return _oRAF(function(real){
    if(_paused&&!_stepOnce){window.requestAnimationFrame(cb);return;}
    _stepOnce=false;
    if(_spd===1){_vt=null;_lr=null;cb(real);return;}
    if(_vt===null){_vt=real;_lr=real;}
    var d=real-_lr;_lr=real;_vt+=d*_spd;
    cb(_vt);
  });
};

function bmosSpeed(s,id){
  _spd=s;_vt=null;_lr=null;
  document.querySelectorAll('[id^="bs"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
}
function bmosPause(){
  _paused=!_paused;
  var b=document.getElementById('bpause');
  b.textContent=_paused?'▶ Resume':'⏸ Pause';
  b.classList.toggle('on',_paused);
}
function bmosStep(){_stepOnce=true;}

// ── Filters ───────────────────────────────────────────────────────────────────
var _fx='',_zoom=1;
function bmosApplyFx(){
  document.querySelectorAll('canvas').forEach(function(c){
    c.style.filter=_fx;
    c.style.transform=_zoom===1?'':'scale('+_zoom+')';
    c.style.transformOrigin='center center';
  });
}
new MutationObserver(bmosApplyFx).observe(document.body,{childList:true,subtree:true});
function bmosFx(f,id){
  _fx=f;
  document.querySelectorAll('[id^="bf"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  bmosApplyFx();
}
function bmosZoom(f){_zoom=Math.min(4,Math.max(0.2,_zoom*f));bmosApplyFx();}
function bmosZoomReset(){_zoom=1;bmosApplyFx();}
function bmosFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen().catch(function(){});
}
function bmosScreenshot(){
  var c=document.querySelector('canvas');
  if(!c){bmosLog('No canvas found');return;}
  try{var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='cobb-'+Date.now()+'.png';a.click();}
  catch(e){bmosLog('Shot failed: '+e.message);}
}

// ── Runtime detection — tries every known C3 property path ───────────────────
function bmosRT(){
  var ri=window.c3_runtimeInterface;
  if(!ri) return null;
  // try every known path for the local runtime object
  return ri._localRuntime || ri.localRuntime || ri._runtime || ri.runtime || null;
}

function bmosGetTypes(){
  var rt=bmosRT(); if(!rt) return null;
  // try every known path for the object type map
  return rt._objectTypes || rt._objectTypesByName || rt.objectTypes ||
         rt._objectTypeMap || rt._worldManager&&rt._worldManager._objectTypes || null;
}

// ── Debug helpers ─────────────────────────────────────────────────────────────
function bmosLog(msg){document.getElementById('bmos-log').textContent='> '+msg;}
function bmosDump(txt){document.getElementById('bmos-dump').textContent=txt;}
function bmosClearLog(){bmosLog('');bmosDump('');}

function bmosRTStatus(){
  var ri=window.c3_runtimeInterface;
  if(!ri){bmosLog('c3_runtimeInterface not found yet — wait for game to fully load');return;}
  // list top-level keys on the runtimeInterface
  var keys=Object.getOwnPropertyNames(ri).filter(function(k){return k.startsWith('_');}).slice(0,40);
  var rt=bmosRT();
  bmosLog(rt?'Runtime found! ✓ See keys below':'_localRuntime is null — still loading?');
  bmosDump('ri keys: '+keys.join(', '));
}

function bmosListObjs(){
  var rt=bmosRT();
  if(!rt){
    // try harder — dump all underscore keys on runtimeInterface so we can find the right path
    var ri=window.c3_runtimeInterface;
    if(!ri){bmosLog('c3_runtimeInterface missing — game still loading');return;}
    var keys=Object.getOwnPropertyNames(ri).filter(function(k){return k.startsWith('_')&&ri[k]&&typeof ri[k]==='object';});
    bmosLog('_localRuntime null — inspecting ri sub-objects...');
    bmosDump(keys.join('\n'));
    return;
  }
  var types=bmosGetTypes();
  if(!types){
    // dump rt keys so we can find the right property
    var rk=Object.getOwnPropertyNames(rt).filter(function(k){return k.startsWith('_');}).slice(0,50);
    bmosLog('Object types map not found — dumping rt keys');
    bmosDump(rk.join(', '));
    return;
  }
  var names=[];
  types.forEach(function(t){names.push(t._name||t.name||'?');});
  bmosLog('Found '+names.length+' types (tell me these names!)');
  bmosDump(names.join('\n'));
}

function bmosListVars(){
  var rt=bmosRT();
  if(!rt){bmosLog('Runtime not ready');return;}
  // try to find global variables
  var vars=rt._globalVars||rt._globalVariables||rt.globalVars||null;
  if(!vars){bmosLog('No global vars found');bmosDump('');return;}
  var out=[];
  if(Array.isArray(vars)){
    vars.forEach(function(v){out.push((v._name||v.name||'?')+' = '+(v._value!==undefined?v._value:v.value));});
  } else if(vars.forEach){
    vars.forEach(function(v,k){out.push(k+' = '+(v._value!==undefined?v._value:v));});
  }
  bmosLog('Global vars ('+out.length+'):');
  bmosDump(out.join('\n')||'(empty)');
}

function bmosDeepSearch(){
  // walk c3_runtimeInterface looking for anything with a forEach that returns objects with _name
  var ri=window.c3_runtimeInterface;
  if(!ri){bmosLog('c3_runtimeInterface missing');return;}
  var found=[];
  function tryMap(obj,path,depth){
    if(depth>3||!obj||typeof obj!=='object') return;
    try{
      if(typeof obj.forEach==='function'){
        var count=0;
        obj.forEach(function(v){
          if(v&&(v._name||v.name)) found.push(path+': '+(v._name||v.name));
          count++;
          if(count>100) return;
        });
        if(count>0&&found.length===0) found.push(path+': '+count+' entries (no _name)');
      }
    }catch(e){}
    if(depth<2){
      Object.getOwnPropertyNames(obj).forEach(function(k){
        if(k.startsWith('_')&&obj[k]&&typeof obj[k]==='object'){
          try{tryMap(obj[k],path+'.'+k,depth+1);}catch(e){}
        }
      });
    }
  }
  tryMap(ri,'ri',0);
  bmosLog(found.length?'Deep search results:':'Nothing found with _name — try RT Status first');
  bmosDump(found.slice(0,60).join('\n'));
}

// ── Player name ───────────────────────────────────────────────────────────────
var _playerName='';
function bmosSetPlayer(){
  _playerName=document.getElementById('bmos-pname').value.trim();
  bmosLog(_playerName?'Player set to: '+_playerName:'Cleared player name');
}

function bmosGetPlayerInsts(){
  var types=bmosGetTypes(); if(!types) return [];
  var out=[];
  types.forEach(function(t){
    var n=(t._name||t.name||'').toLowerCase();
    var search=_playerName?_playerName.toLowerCase():null;
    if(!search||n===search||n.includes(search)){
      var arr=t._instances||t.instances||[];
      arr.forEach(function(i){out.push({type:t,inst:i,name:t._name||t.name});});
    }
  });
  return out;
}

// ── Hacks ─────────────────────────────────────────────────────────────────────
function bmosHack(cmd){
  var rt=bmosRT();
  if(!rt){bmosLog('Runtime not ready — fully load the game first');return;}

  var insts=bmosGetPlayerInsts();

  if(cmd==='giant'||cmd==='tiny'||cmd==='norm'){
    if(!insts.length){bmosLog('No object found — set player name above, or use List Objs');return;}
    var scale=cmd==='giant'?3.5:cmd==='tiny'?0.3:1;
    var changed=0;
    insts.forEach(function(o){
      var i=o.inst;
      try{
        var ow=i._originalWidth||i._width||i.width||32;
        var oh=i._originalHeight||i._height||i.height||32;
        if(!i._originalWidth&&cmd!=='norm'){i._originalWidth=ow;i._originalHeight=oh;}
        var tw=(i._originalWidth||ow)*scale, th=(i._originalHeight||oh)*scale;
        if(typeof i.SetSize==='function'){i.SetSize(tw,th);changed++;}
        else if(i._width!==undefined){i._width=tw;i._height=th;changed++;}
      }catch(e){bmosLog('Size err: '+e.message);}
    });
    bmosLog(changed?'Size applied to '+changed+' instance(s)':'SetSize not accessible on this object');
    return;
  }

  if(cmd==='tp'){
    if(!insts.length){bmosLog('No object found — set player name first');return;}
    insts.forEach(function(o){
      var i=o.inst;
      try{
        if(typeof i.SetX==='function'){i.SetX(100);i.SetY(100);}
        else{i._x=100;i._y=100;}
      }catch(e){}
    });
    bmosLog('Teleported '+insts.length+' instance(s) to (100,100)');
    return;
  }

  if(cmd==='show_pos'){
    if(!insts.length){bmosLog('No object found — set player name first');return;}
    var pos=insts.map(function(o){
      var i=o.inst;
      var x=typeof i.GetX==='function'?i.GetX():(i._x||0);
      var y=typeof i.GetY==='function'?i.GetY():(i._y||0);
      return o.name+': ('+Math.round(x)+', '+Math.round(y)+')';
    });
    bmosLog('Positions:');
    bmosDump(pos.join('\n'));
    return;
  }

  if(cmd==='spawn_copy'){
    if(!insts.length){bmosLog('No object — set player name first');return;}
    try{
      var src=insts[0].inst;
      var type=insts[0].type;
      var layout=rt._currentLayout||rt.layout||rt._layoutManager&&rt._layoutManager._currentLayout;
      var layer=layout._layers[0];
      var px=(typeof src.GetX==='function'?src.GetX():src._x||100)+80;
      var py=typeof src.GetY==='function'?src.GetY():src._y||100;
      var ni=rt.CreateWorldInstance?rt.CreateWorldInstance(type,layer,px,py):null;
      if(!ni&&type._CreateInstance) ni=type._CreateInstance(layer,px,py);
      bmosLog(ni?'Copy spawned!':'Spawn API not accessible — try Deep Search for clues');
    }catch(e){bmosLog('Spawn err: '+e.message);}
    return;
  }

  if(cmd==='kill_non_player'){
    var types=bmosGetTypes(); if(!types){bmosLog('Types not found');return;}
    var pname=_playerName.toLowerCase();
    var killed=0;
    types.forEach(function(t){
      var n=(t._name||t.name||'').toLowerCase();
      if(pname&&n===pname) return;
      if(n.includes('ui')||n.includes('hud')||n.includes('text')||n.includes('layer')) return;
      var arr=t._instances||t.instances||[];
      // copy array since destroying modifies it
      [].concat(arr).forEach(function(i){
        try{if(typeof i.Destroy==='function'){i.Destroy();killed++;}}catch(e){}
      });
    });
    bmosLog('Destroyed '+killed+' non-player objects');
    return;
  }

  if(cmd==='freeze_non_player'){
    var types=bmosGetTypes(); if(!types){bmosLog('Types not found');return;}
    var pname=_playerName.toLowerCase();
    var frozen=0;
    types.forEach(function(t){
      var n=(t._name||t.name||'').toLowerCase();
      if(pname&&n===pname) return;
      var arr=t._instances||t.instances||[];
      arr.forEach(function(i){
        try{
          // try platform/physics behavior velocity
          if(i._behaviors){
            Object.values(i._behaviors).forEach(function(b){
              if(b._dx!==undefined){b._dx=0;b._dy=0;frozen++;}
              if(b._vx!==undefined){b._vx=0;b._vy=0;frozen++;}
              if(b._speed!==undefined){b._speed=0;frozen++;}
            });
          }
          if(i._vx!==undefined){i._vx=0;i._vy=0;frozen++;}
        }catch(e){}
      });
    });
    bmosLog(frozen?'Froze '+frozen+' behavior(s)':'Velocity properties not found on non-player objects');
    return;
  }
}

  if(e.key==='m'||e.key==='M'){var m=document.getElementById('bmos-menu');m.classList.contains('open')?bmosClose():bmosOpen();}
  if(e.key==='Escape')bmosClose();
});
