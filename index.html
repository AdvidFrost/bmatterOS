<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="icon" href="./icon-192.png" type="image/png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000">
  <title>bmatterOS</title>
  <style>
    html, body { margin:0; width:100%; height:100%; background:#000; overflow:hidden; }
  </style>
</head>
<body>
<script>
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  let deferredPrompt = null;
  let promptAttempted = false;

  const BASE_URL = 'https://bmatteros.pages.dev/';
  const W = Math.round(screen.availWidth * 0.55);
  const H = Math.round(screen.availHeight * 0.45);
  const L = Math.round((screen.availWidth - W) / 2);
  const T = Math.round((screen.availHeight - H) / 2);
  const FEATS = 'width='+W+',height='+H+',left='+L+',top='+T+',menubar=yes,status=yes,location=yes';

  async function runInjection() {
    // Fetch app.html first in the background
    let appHTML = null;
    try {
      const r = await fetch(BASE_URL + 'app.html?t=' + Date.now(), { cache: 'no-store' });
      appHTML = await r.text();
      // Skip the built-in terminal loader since we show our own
      appHTML = appHTML
        .replace(/id="terminal-loader"[^>]*>[\s\S]*?(?=<div id="app")/, 'id="terminal-loader" style="display:none">__REMOVED__</div>\n')
        .replace('runLoader();', '')
        .replace('#app { display:none;', '#app { display:flex;')
        .replace('#app.visible { display:flex; }', '');
    } catch(e) {}

    // Open loading window
    const loadWin = window.open('about:blank#bmatteros-loading', '_blank', FEATS);
    if (!loadWin) return;

    const loaderHTML = `<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>&#8203;</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#0a0a0a; overflow:hidden; }
#wrap { width:100%; height:100%; background:#0a0a0a; color:#ccc; font-family:'Courier New',monospace; font-size:12px; padding:16px; overflow-y:auto; }
.ln { margin-bottom:3px; line-height:1.5; }
.red { color:#e53e3e; }
.cur { display:inline-block; width:7px; height:12px; background:#e53e3e; vertical-align:middle; animation:bl 0.8s infinite; }
@keyframes bl { 0%,100%{opacity:1}50%{opacity:0} }
</style>
</head>
<body>
<div id="wrap">
  <div id="tc"></div>
  <div class="ln">C:\\Users\\bmatter&gt; <span class="cur"></span></div>
</div>
<script>
var tc = document.getElementById('tc');
var wrap = document.getElementById('wrap');
var items = ['core.sys','renderer.js','theme.engine','sidebar.nav','games.registry','tictactoe.mod','settings.cfg','ui.framework','session.init','cloak.ready'];

function add(html) {
  var d = document.createElement('div');
  d.className = 'ln';
  d.innerHTML = html;
  tc.appendChild(d);
  wrap.scrollTop = 99999;
}

function delay(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

async function run() {
  add('bmatterOS Terminal [v1.0.0]');
  add('(c) bmatterOS. All rights reserved.<br>');
  await delay(100);
  add('C:\\\\Users\\\\bmatter&gt; <span class="red">bmatteros --init</span>');
  await delay(150);
  add('Initializing system modules...<br>');
  for (var i = 0; i < items.length; i++) {
    await delay(160);
    add('FETCHED [' + items[i] + '] -&gt; <span class="red">READY</span>');
  }
  await delay(300);
  add('<br><span class="red">All systems ready. Launching bmatterOS...</span>');
  await delay(600);
  // Signal parent that loading is done
  window.opener && window.opener.postMessage('bmatteros-ready', '*');
}
run();
<\/script>
</body>
</html>`;

    loadWin.document.open();
    loadWin.document.write(loaderHTML);
    loadWin.document.close();

    // Close PWA window
    window.open('', '_self');
    window.close();

    // Wait for loading window to signal it's done
    window.addEventListener('message', function handler(e) {
      if (e.data !== 'bmatteros-ready') return;
      window.removeEventListener('message', handler);

      // Open the final about:blank app window
      const appWin = window.open('about:blank#bmatteros', '_blank', FEATS);
      if (!appWin) { loadWin.location.href = BASE_URL + 'app.html'; return; }

      appWin.document.open();
      if (appHTML) {
        appWin.document.write('<base href="' + BASE_URL + '">' + appHTML);
      } else {
        appWin.document.write(
          '<!doctype html><html><head><meta charset="utf-8"><title>&#8203;</title>' +
          '<style>html,body{margin:0;width:100%;height:100%;background:#0a0a0a;overflow:hidden;}</style></head>' +
          '<body><script>(async()=>{' +
          'const r=await fetch("' + BASE_URL + 'app.html?t="+Date.now(),{cache:"no-store"});' +
          'const h=await r.text();' +
          'document.open();document.write(\'<base href="' + BASE_URL + '">\'+h);document.close();' +
          '})();<\/script></body></html>'
        );
      }
      appWin.document.close();

      // Close the loading window
      loadWin.close();
    });
  }

  async function tryInstallPrompt() {
    if (promptAttempted || !deferredPrompt) return;
    promptAttempted = true;
    try {
      await deferredPrompt.prompt();
      await deferredPrompt.userChoice;
    } catch(e) {
    } finally {
      deferredPrompt = null;
      removePromptListeners();
    }
  }

  function addPromptListeners() {
    window.addEventListener('click', tryInstallPrompt, { once: true });
    window.addEventListener('keydown', tryInstallPrompt, { once: true });
    window.addEventListener('touchstart', tryInstallPrompt, { once: true });
  }

  function removePromptListeners() {
    window.removeEventListener('click', tryInstallPrompt);
    window.removeEventListener('keydown', tryInstallPrompt);
    window.removeEventListener('touchstart', tryInstallPrompt);
  }

  if (!isPWA) {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      addPromptListeners();
    });
  }

  if (isPWA) {
    runInjection();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
