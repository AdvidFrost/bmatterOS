	<!-- WebView2 polyfill — game was exported as Windows wrapper; simulate handshake so runtime doesn't hang -->
	<script>
	(function() {
		if (!window.chrome) window.chrome = {};
		if (!window.chrome.webview) {
			var _listeners = {};
			window.chrome.webview = {
				addEventListener: function(type, fn) { _listeners[type] = fn; },
				removeEventListener: function() {},
				postMessage: function(dataStr) {
					try {
						var msg = JSON.parse(dataStr);
						if (msg.type === 'wrapper-init' && _listeners['message']) {
							setTimeout(function() {
								_listeners['message']({
									data: { type: 'wrapper-init-response', registeredComponentIds: [] },
									additionalObjects: null
								});
							}, 0);
						}
					} catch(e) {}
				}
			};
		}
	})();
	</script>

					</div>

	<script>
	// ── speed hack via RAF wrapping ──────────────────────────────────────────
	var _bmosSpeed = 1;
	var _bmosRafAcc = 0;
	var _bmosLastReal = null;
	var _bmosOrigRAF = window.requestAnimationFrame.bind(window);
	var _bmosOrigCAF = window.cancelAnimationFrame.bind(window);
	var _bmosCallbacks = new Map();
	var _bmosIdCounter = 1;

	window.requestAnimationFrame = function(cb) {
		var id = _bmosIdCounter++;
		_bmosCallbacks.set(id, cb);
		_bmosOrigRAF(function(ts) {
			if (!_bmosCallbacks.has(id)) return;
			_bmosCallbacks.delete(id);
			if (_bmosSpeed === 1) { cb(ts); return; }
			// accumulate fractional frames for slow/fast
			if (_bmosLastReal === null) _bmosLastReal = ts;
			var real = ts - _bmosLastReal;
			_bmosLastReal = ts;
			_bmosRafAcc += real * _bmosSpeed;
			if (_bmosRafAcc >= 16) {
				var steps = Math.floor(_bmosRafAcc / 16);
				_bmosRafAcc %= 16;
				for (var i = 0; i < steps; i++) cb(ts + i * 16);
			} else if (_bmosSpeed < 1) {
				// slow: only fire when accumulated enough
				if (_bmosRafAcc > 0) cb(ts);
			} else {
				cb(ts);
			}
		});
		return id;
	};
	window.cancelAnimationFrame = function(id) {
		_bmosCallbacks.delete(id);
		_bmosOrigCAF(id);
	};

	function bmosSetSpeed(s, btnId) {
		_bmosSpeed = s;
		_bmosLastReal = null;
		_bmosRafAcc = 0;
		document.querySelectorAll('[id^="bmos-speed-"]').forEach(function(b) { b.classList.remove('active'); });
		document.getElementById(btnId).classList.add('active');
	}

	// ── visual filters ───────────────────────────────────────────────────────
	var _bmosZoom = 1;
	var _bmosFilterStyle = document.createElement('style');
	document.head.appendChild(_bmosFilterStyle);

	var _bmosFilters = {
		none:   '',
		crt:    'contrast(1.1) brightness(0.9) saturate(1.1)',
		neon:   'saturate(3) contrast(1.2) hue-rotate(15deg)',
		night:  'sepia(0.4) hue-rotate(180deg) brightness(0.7) saturate(1.5)',
		gray:   'grayscale(1)',
		invert: 'invert(1)'
	};

	function bmosApplyFx() {
		var canvas = document.querySelector('canvas');
		if (canvas) canvas.style.filter = _bmosFilters[_bmosCurFx] || '';
		document.querySelectorAll('canvas').forEach(function(c) {
			c.style.filter = _bmosFilters[_bmosCurFx] || '';
			c.style.transform = 'scale(' + _bmosZoom + ')';
			c.style.transformOrigin = 'center center';
		});
	}

	var _bmosCurFx = 'none';
	function bmosSetFx(name, btnId) {
		_bmosCurFx = name;
		document.querySelectorAll('[id^="bmos-fx-"]').forEach(function(b) { b.classList.remove('active'); });
		document.getElementById(btnId).classList.add('active');
		bmosApplyFx();
		// re-apply on DOM changes (canvas may not exist yet)
		setTimeout(bmosApplyFx, 500);
		setTimeout(bmosApplyFx, 1500);
	}

	function bmosZoom(factor) {
		_bmosZoom = Math.min(3, Math.max(0.3, _bmosZoom * factor));
		bmosApplyFx();
	}
	function bmosZoomReset() { _bmosZoom = 1; bmosApplyFx(); }

	// ── screenshot ───────────────────────────────────────────────────────────
	function bmosScreenshot() {
		var canvas = document.querySelector('canvas');
		if (!canvas) { alert('No canvas found — try again after the game loads.'); return; }
		try {
			var url = canvas.toDataURL('image/png');
			var a = document.createElement('a');
			a.href = url;
			a.download = 'cobb-can-move-' + Date.now() + '.png';
			a.click();
		} catch(e) { alert('Screenshot failed (canvas may be protected): ' + e.message); }
	}

	// ── fullscreen ───────────────────────────────────────────────────────────
	function bmosFullscreen() {
		if (!document.fullscreenElement) {
			document.documentElement.requestFullscreen().catch(function(){});
		} else {
			document.exitFullscreen().catch(function(){});
		}
	}

	// ── menu open/close ──────────────────────────────────────────────────────
	function bmosOpenMenu() { document.getElementById('bmos-menu').classList.add('open'); }
	function bmosCloseMenu() { document.getElementById('bmos-menu').classList.remove('open'); }
	function bmosMenuBgClick(e) { if (e.target === document.getElementById('bmos-menu')) bmosCloseMenu(); }

	// press M to toggle
	document.addEventListener('keydown', function(e) {
		if (e.key === 'm' || e.key === 'M') {
			var menu = document.getElementById('bmos-menu');
			menu.classList.contains('open') ? bmosCloseMenu() : bmosOpenMenu();
		}
		if (e.key === 'Escape') bmosCloseMenu();
	});
	</script>
