<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bmatterOS</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #e53e3e;
    overflow: hidden;
  }
  .boot {
    text-align: center;
  }
  .logo {
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 0.3em;
    color: #e53e3e;
    text-shadow: 0 0 30px rgba(229,62,62,0.5);
    margin-bottom: 0.5rem;
  }
  .version {
    font-size: 0.75rem;
    color: #666;
    letter-spacing: 0.2em;
    margin-bottom: 3rem;
  }
  .terminal {
    width: 420px;
    text-align: left;
    font-size: 0.78rem;
    line-height: 1.8;
    max-height: 300px;
    overflow: hidden;
  }
  .line { opacity: 0; }
  .line.show { opacity: 1; }
  .fetched { color: #888; }
  .ready { color: #e53e3e; }
  .prompt { color: #555; }
  .bar {
    width: 420px;
    height: 2px;
    background: #1a1a1a;
    margin: 2rem auto 0;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: #e53e3e;
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px rgba(229,62,62,0.6);
  }
</style>
</head>
<body>
<div class="boot">
  <div class="logo">bmatterOS</div>
  <div class="version">v1.0.0 — system initializing</div>
  <div class="terminal" id="terminal"></div>
  <div class="bar"><div class="bar-fill" id="bar"></div></div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

const items = [
  'core.sys','renderer.js','theme.engine','sidebar.nav',
  'games.registry','tictactoe.mod','settings.cfg',
  'audio.null','ui.framework','session.init'
];

const terminal = document.getElementById('terminal');
const bar = document.getElementById('bar');
let i = 0;

function addLine() {
  if (i < items.length) {
    const div = document.createElement('div');
    div.className = 'line show';
    div.innerHTML = `<span class="fetched">FETCHED [${items[i]}] → </span><span class="ready">READY</span>`;
    terminal.appendChild(div);
    bar.style.width = ((i + 1) / items.length * 85) + '%';
    i++;
    setTimeout(addLine, 180);
  } else {
    setTimeout(launch, 400);
  }
}

function launch() {
  bar.style.width = '100%';
  setTimeout(() => {
    const w = window.open('', '_blank');
    if (!w) { window.location.href = '/app.html'; return; }
    w.document.open();
    w.document.write(APP_HTML);
    w.document.close();
  }, 300);
}

setTimeout(addLine, 600);
</script>

<script src="/app-bundle.js"></script>
</body>
</html>
