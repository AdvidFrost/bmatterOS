<script>
// ── Speed: timestamp scaling ──────────────────────────────────────────────────
var _spd=1,_vt=null,_lr=null,_paused=false,_stepOnce=false;
var _oRAF=window.requestAnimationFrame.bind(window);
window.requestAnimationFrame=function(cb){
  return _oRAF(function(real){
    if(_paused&&!_stepOnce){window.requestAnimationFrame(cb);return;}
    _stepOnce=false;
    if(_spd===1){_vt=null;_lr=null;cb(real);return;}
    if(_vt===null){_vt=real;_lr=real;}
    var d=real-_lr;_lr=real;_vt+=d*_spd;cb(_vt);
  });
};
function bmosSpeed(s,id){
  _spd=s;_vt=null;_lr=null;
  document.querySelectorAll('[id^="bs"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
}
function bmosPause(){
  _paused=!_paused;
  var b=document.getElementById('bpause');
  b.textContent=_paused?'▶ Resume':'⏸ Pause';
  b.classList.toggle('on',_paused);
}
function bmosStep(){_stepOnce=true;}

// ── Filters ───────────────────────────────────────────────────────────────────
var _fx='',_zoom=1;
function bmosApplyFx(){
  document.querySelectorAll('canvas').forEach(function(c){
    c.style.filter=_fx;
    c.style.transform=_zoom===1?'':'scale('+_zoom+')';
    c.style.transformOrigin='center center';
  });
}
new MutationObserver(bmosApplyFx).observe(document.body,{childList:true,subtree:true});
function bmosFx(f,id){
  _fx=f;
  document.querySelectorAll('[id^="bf"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  bmosApplyFx();
}
function bmosZoom(f){_zoom=Math.min(4,Math.max(0.2,_zoom*f));bmosApplyFx();}
function bmosZoomReset(){_zoom=1;bmosApplyFx();}
function bmosFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen().catch(function(){});
}
function bmosScreenshot(){
  var c=document.querySelector('canvas');
  if(!c){bmosLog('No canvas');return;}
  try{var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='cobb-'+Date.now()+'.png';a.click();}
  catch(e){bmosLog('Shot failed: '+e.message);}
}

// ── Runtime ───────────────────────────────────────────────────────────────────
function bmosRT(){
  var ri=window.c3_runtimeInterface;
  return ri&&(ri._localRuntime||ri.localRuntime||ri._runtime||ri.runtime)||null;
}
// now using _allObjectClasses — confirmed by Deep Search
function bmosTypes(){
  var rt=bmosRT();
  return rt&&(rt._allObjectClasses||rt._objectTypes||rt._objectTypesByName)||null;
}
function bmosInsts(nameHint){
  var types=bmosTypes(); if(!types) return [];
  var hint=nameHint?nameHint.toLowerCase():null;
  var out=[];
  types.forEach(function(t){
    var n=(t._name||t.name||'').toLowerCase();
    if(!hint||n===hint||n.includes(hint)){
      var arr=t._instances||t.instances||[];
      arr.forEach(function(i){out.push({t:t,i:i,n:t._name||t.name||'?'});});
    }
  });
  return out;
}
function bmosLog(msg){document.getElementById('bmos-log').textContent='> '+msg;}

// ── God mode loop — max out hunger/warmth bars every 500ms ───────────────────
var _god=false,_godTimer=null;
function bmosToggleGod(){
  _god=!_god;
  var b=document.getElementById('bgod');
  b.classList.toggle('on',_god);
  b.textContent=_god?'❤ God ON':'❤ God Mode';
  if(_god){
    _godTimer=setInterval(function(){
      bmosMaxBar('playerHungerBar');
      bmosMaxBar('playerFreezeBar');
    },500);
    bmosLog('God mode ON — hunger+warmth maxed');
  } else {
    clearInterval(_godTimer);
    bmosLog('God mode OFF');
  }
}
function bmosMaxBar(name){
  // bars are likely sprites whose scaleX or width represents the value
  // try setting width to original width, and also try any _value/_cur properties
  bmosInsts(name).forEach(function(o){
    var i=o.i;
    try{
      if(i._originalWidth===undefined)i._originalWidth=i._width||i.width||100;
      if(typeof i.SetWidth==='function') i.SetWidth(i._originalWidth);
      else if(i._width!==undefined) i._width=i._originalWidth;
      // also try direct value properties
      if(i._value!==undefined)i._value=1;
      if(i._cur!==undefined)i._cur=i._max||100;
    }catch(e){}
  });
}

// ── Player helpers ────────────────────────────────────────────────────────────
function bmosPlayer(){ return bmosInsts('player').filter(function(o){return o.n==='player';}); }
function bmosGetXY(i){
  return {
    x:typeof i.GetX==='function'?i.GetX():(i._x||0),
    y:typeof i.GetY==='function'?i.GetY():(i._y||0)
  };
}
function bmosSetXY(i,x,y){
  try{if(typeof i.SetX==='function'){i.SetX(x);i.SetY(y);}else{i._x=x;i._y=y;}}catch(e){}
}

// ── Resize helper ─────────────────────────────────────────────────────────────
function bmosResize(insts,scale){
  var done=0;
  insts.forEach(function(o){
    var i=o.i;
    try{
      if(!i._origW){i._origW=i._width||i.width||32;i._origH=i._height||i.height||32;}
      var w=i._origW*(scale<0?1:scale), h=i._origH*(scale<0?1:scale);
      if(typeof i.SetSize==='function'){i.SetSize(w,h);done++;}
      else if(i._width!==undefined){i._width=w;i._height=h;done++;}
    }catch(e){}
  });
  return done;
}

// ── Hacks ─────────────────────────────────────────────────────────────────────
function bmosHack(cmd){
  if(!bmosRT()){bmosLog('Runtime not ready — get into the game first');return;}

  // ── Player hacks ──
  if(cmd==='fill_hunger'){ bmosMaxBar('playerHungerBar'); bmosLog('Hunger filled'); return; }
  if(cmd==='fill_warmth'){ bmosMaxBar('playerFreezeBar'); bmosLog('Warmth filled'); return; }

  if(cmd==='giant'){
    var n=bmosResize(bmosPlayer(),3.5);
    bmosLog(n?'Player enlarged':'player instances not found'); return;
  }
  if(cmd==='tiny'){
    var n=bmosResize(bmosPlayer(),0.3);
    bmosLog(n?'Player shrunk':'player instances not found'); return;
  }
  if(cmd==='norm_size'){
    var n=bmosResize(bmosPlayer(),-1);// -1 = reset to origW/origH
    bmosLog(n?'Size reset':'player instances not found'); return;
  }

  if(cmd==='show_pos'){
    var pl=bmosPlayer();
    if(!pl.length){bmosLog('player not found');return;}
    var p=bmosGetXY(pl[0].i);
    bmosLog('Player: ('+Math.round(p.x)+', '+Math.round(p.y)+')'); return;
  }

  if(cmd==='tp_000'){
    var pl=bmosPlayer();
    if(!pl.length){bmosLog('player not found');return;}
    pl.forEach(function(o){bmosSetXY(o.i,0,0);});
    bmosLog('Teleported to (0,0)'); return;
  }

  if(cmd==='noclip_info'){
    bmosLog('Noclip needs Platform behavior access — checking...');
    var pl=bmosPlayer();
    if(!pl.length){bmosLog('player not found');return;}
    var i=pl[0].i;
    var bkeys=i._behaviors?Object.keys(i._behaviors):[];
    bmosLog(bkeys.length?'Behaviors: '+bkeys.join(', '):'No _behaviors found on player');
    return;
  }

  // ── Cobb / monster hacks ──
  if(cmd==='kill_cobb'){
    var targets=bmosInsts('flesh').concat(bmosInsts('monsterProp'));
    var k=0;
    targets.forEach(function(o){try{if(typeof o.i.Destroy==='function'){o.i.Destroy();k++;}}catch(e){}});
    bmosLog(k?'Destroyed '+k+' Cobb instance(s)':'No flesh/monsterProp instances found'); return;
  }

  if(cmd==='freeze_cobb'){
    var targets=bmosInsts('flesh').concat(bmosInsts('monsterProp'));
    var f=0;
    targets.forEach(function(o){
      var i=o.i;
      try{
        if(i._behaviors){
          Object.values(i._behaviors).forEach(function(b){
            ['_dx','_dy','_vx','_vy','_speed','_platformVx','_platformVy'].forEach(function(k){
              if(b[k]!==undefined){b[k]=0;f++;}
            });
          });
        }
        ['_vx','_vy','_dx','_dy','_speed'].forEach(function(k){if(i[k]!==undefined){i[k]=0;f++;}});
      }catch(e){}
    });
    bmosLog(f?'Froze Cobb ('+f+' velocity props zeroed)':'Velocity props not found — try 0.25x speed instead'); return;
  }

  if(cmd==='giant_cobb'){
    var n=bmosResize(bmosInsts('flesh').concat(bmosInsts('monsterProp')),4);
    bmosLog(n?'Cobb is now enormous':'flesh/monsterProp not found'); return;
  }
  if(cmd==='tiny_cobb'){
    var n=bmosResize(bmosInsts('flesh').concat(bmosInsts('monsterProp')),0.2);
    bmosLog(n?'Cobb is tiny':'flesh/monsterProp not found'); return;
  }

  // ── World hacks ──
  if(cmd==='spawn_grabbable'||cmd==='spawn_seed'){
    var typeName=cmd==='spawn_seed'?'seed':'grabbable';
    var src=bmosInsts(typeName);
    if(!src.length){bmosLog(typeName+' instances not currently loaded');return;}
    var pl=bmosPlayer();
    var px=200,py=200;
    if(pl.length){var p=bmosGetXY(pl[0].i);px=p.x+80;py=p.y;}
    var rt=bmosRT();
    var type=src[0].t;
    try{
      var layout=rt._currentLayout||rt._layoutManager&&rt._layoutManager._currentLayout;
      var layer=layout&&layout._layers&&layout._layers[0];
      var ni=null;
      if(rt.CreateWorldInstance)ni=rt.CreateWorldInstance(type,layer,px,py);
      if(!ni&&type._CreateInstance)ni=type._CreateInstance(layer,px,py);
      bmosLog(ni?typeName+' spawned near player!':'Spawn API not accessible on this C3 version');
    }catch(e){bmosLog('Spawn err: '+e.message);}
    return;
  }

  if(cmd==='kill_env'){
    var envNames=['envChunk','envGrass','envPlant','envBush','envCarpet','deadProps','flesh'];
    var k=0;
    envNames.forEach(function(name){
      var arr=bmosInsts(name);
      // slice to avoid mutation during iteration
      arr.slice().forEach(function(o){
        try{if(typeof o.i.Destroy==='function'){o.i.Destroy();k++;}}catch(e){}
      });
    });
    bmosLog('Cleared '+k+' environment objects'); return;
  }

  if(cmd==='conveyor_fast'||cmd==='conveyor_rev'||cmd==='conveyor_stop'){
    var convs=bmosInsts('conveyor');
    var done=0;
    convs.forEach(function(o){
      var i=o.i;
      try{
        // Construct conveyor belt behavior typically stores speed in _speed or via behavior
        var spd=cmd==='conveyor_stop'?0:cmd==='conveyor_fast'?600:-300;
        if(i._behaviors){
          Object.values(i._behaviors).forEach(function(b){
            if(b._speed!==undefined){b._speed=spd;done++;}
            if(b._scrollSpeed!==undefined){b._scrollSpeed=spd;done++;}
          });
        }
        if(i._speed!==undefined){i._speed=spd;done++;}
      }catch(e){}
    });
    bmosLog(done?'Conveyors updated ('+done+' props)':'Conveyor speed prop not found'); return;
  }
}

// ── Menu ──────────────────────────────────────────────────────────────────────
function bmosOpen(){document.getElementById('bmos-menu').classList.add('open');}
function bmosClose(){document.getElementById('bmos-menu').classList.remove('open');}
document.addEventListener('keydown',function(e){
  if(e.key==='m'||e.key==='M'){var m=document.getElementById('bmos-menu');m.classList.contains('open')?bmosClose():bmosOpen();}
  if(e.key==='Escape')bmosClose();
});
