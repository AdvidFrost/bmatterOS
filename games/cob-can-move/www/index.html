<script>
// ── Logging ───────────────────────────────────────────────────────────────────
var _logLines=[];
function bmosLog(msg){
  _logLines=['> '+msg];
  document.getElementById('bmos-log').textContent=_logLines.join('\n');
}
function bmosAppend(msg){
  _logLines.push(msg);
  var el=document.getElementById('bmos-log');
  el.textContent=_logLines.join('\n');
  el.scrollTop=el.scrollHeight;
}
function bmosLogClear(){
  _logLines=[];
  document.getElementById('bmos-log').textContent='ready.';
}

// ── Runtime ───────────────────────────────────────────────────────────────────
function bmosRT(){
  var ri=window.c3_runtimeInterface;
  return ri&&(ri._localRuntime||ri.localRuntime||ri._runtime||ri.runtime)||null;
}
// Direct lookup via _objectClassesByName (Map), falls back to iterating _allObjectClasses (Array)
function bmosGetType(name){
  var rt=bmosRT(); if(!rt) return null;
  var byName=rt._objectClassesByName;
  if(byName){
    var t=typeof byName.get==='function'?byName.get(name):byName[name];
    if(t) return t;
  }
  // case-insensitive fallback
  var types=rt._allObjectClasses||[];
  for(var i=0;i<types.length;i++){
    if((types[i]._name||'').toLowerCase()===name.toLowerCase()) return types[i];
  }
  return null;
}
function bmosInsts(name){
  var t=bmosGetType(name); if(!t) return [];
  var arr=t._instances||[];
  return arr.map(function(i){return {t:t,i:i,n:t._name||name};});
}

// ── Instance helpers ────────────────────────────────────────────────────────────
// Position is stored in _worldInfo._x/_y
function bmosGetXY(i){
  var wi=i._worldInfo;
  if(wi) return {x:wi._x||0,y:wi._y||0};
  return {x:typeof i.GetX==='function'?i.GetX():(i._x||0),y:typeof i.GetY==='function'?i.GetY():(i._y||0)};
}
function bmosSetXY(i,x,y){
  try{
    var wi=i._worldInfo;
    if(wi){wi._x=x;wi._y=y;}
    else if(typeof i.SetX==='function'){i.SetX(x);i.SetY(y);}
    else{i._x=x;i._y=y;}
  }catch(e){}
}
// Size is in _worldInfo._width/_height
function bmosGetSize(i){
  var wi=i._worldInfo;
  if(wi) return {w:wi._width||32,h:wi._height||32};
  return {w:i._width||i.width||32,h:i._height||i.height||32};
}
function bmosSetSize(i,w,h){
  try{
    var wi=i._worldInfo;
    if(wi){wi._width=w;wi._height=h;}
    else if(typeof i.SetSize==='function'){i.SetSize(w,h);}
    else{i._width=w;i._height=h;}
  }catch(e){}
}
// Destroy via _sdkInst.destroy() — the public JS API C3 exposes
function bmosDestroy(i){
  try{
    if(i._sdkInst&&typeof i._sdkInst.destroy==='function'){i._sdkInst.destroy();return true;}
    if(i._iScriptInterface&&typeof i._iScriptInterface.destroy==='function'){i._iScriptInterface.destroy();return true;}
    if(typeof i.Destroy==='function'){i.Destroy();return true;}
  }catch(e){}
  return false;
}
// Behaviors in _behaviorInstances (Array)
function bmosBehaviors(i){
  var bis=i._behaviorInstances;
  if(!bis) return [];
  return Array.isArray(bis)?bis:Object.values(bis);
}
function bmosFindPlatBehavior(i){
  var bs=bmosBehaviors(i);
  for(var j=0;j<bs.length;j++){
    if(bs[j]&&bs[j]._maxSpeed!==undefined) return bs[j];
  }
  return null;
}

// ── Diagnostic ────────────────────────────────────────────────────────────────
function bmosDiag(){
  _logLines=[];
  var el=document.getElementById('bmos-log');
  function out(s){_logLines.push(s);el.textContent=_logLines.join('\n');el.scrollTop=el.scrollHeight;}
  var ri=window.c3_runtimeInterface;
  if(!ri){out('c3_runtimeInterface: NOT FOUND');return;}
  var rt=ri._localRuntime||ri.localRuntime||null;
  if(!rt){out('localRuntime: NOT FOUND');return;}
  out('runtime OK');
  var targets=['player','flesh','playerHungerBar','monsterProp','grabbable','conveyor'];
  targets.forEach(function(name){
    var t=bmosGetType(name);
    if(!t){out(name+': type NOT found');return;}
    var insts=t._instances||[];
    out(name+': '+insts.length+' instances');
    if(insts[0]){
      var wi=insts[0]._worldInfo;
      out('  worldInfo: '+(wi?'x='+wi._x+' y='+wi._y+' w='+wi._width:'none'));
      var bs=bmosBehaviors(insts[0]);
      if(bs.length){
        out('  behaviors('+bs.length+'): '+bs.map(function(b){return Object.keys(b).slice(0,4).join(',');}).join(' | '));
      }
    }
  });
  out('-- done --');
}

// ── Game Speed: timestamp scaling ─────────────────────────────────────────────
var _spd=1,_vt=null,_lr=null,_paused=false,_stepOnce=false;
var _oRAF=window.requestAnimationFrame.bind(window);
window.requestAnimationFrame=function(cb){
  return _oRAF(function(real){
    if(_paused&&!_stepOnce){window.requestAnimationFrame(cb);return;}
    _stepOnce=false;
    if(_spd===1){_vt=null;_lr=null;cb(real);return;}
    if(_vt===null){_vt=real;_lr=real;}
    var d=real-_lr;_lr=real;_vt+=d*_spd;cb(_vt);
  });
};
function bmosSpeed(s,id){
  _spd=s;_vt=null;_lr=null;
  document.querySelectorAll('[id^="bs"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
}
function bmosPause(){
  _paused=!_paused;
  var b=document.getElementById('bpause');
  b.textContent=_paused?'&#x25B6; Resume':'&#x23F8; Pause';
  b.classList.toggle('on',_paused);
}
function bmosStep(){_stepOnce=true;}

// ── Player Speed: Platform behavior only ──────────────────────────────────────
var _platOrig=null;
function bmosPlayerSpeed(mult,id){
  if(!bmosRT()){bmosLog('Get into the game first');return;}
  var pl=bmosInsts('player');
  if(!pl.length){bmosLog('player not found');return;}
  var plat=bmosFindPlatBehavior(pl[0].i);
  if(!plat){bmosLog('Platform behavior not found — use Game Speed instead');return;}
  if(!_platOrig){
    _platOrig={
      maxSpeed:plat._maxSpeed,
      accel:plat._accel!==undefined?plat._accel:null,
      decel:plat._decel!==undefined?plat._decel:null,
      jumpStrength:plat._jumpStrength!==undefined?plat._jumpStrength:null
    };
  }
  plat._maxSpeed=_platOrig.maxSpeed*mult;
  if(_platOrig.accel!==null)plat._accel=_platOrig.accel*mult;
  if(_platOrig.decel!==null)plat._decel=_platOrig.decel*mult;
  if(_platOrig.jumpStrength!==null)plat._jumpStrength=_platOrig.jumpStrength*Math.sqrt(mult);
  document.querySelectorAll('[id^="bps"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  bmosLog('Player speed x'+mult+' (maxSpd='+(plat._maxSpeed|0)+')');
}

// ── Filters ───────────────────────────────────────────────────────────────────
var _fx='',_zoom=1;
function bmosApplyFx(){
  document.querySelectorAll('canvas').forEach(function(c){
    c.style.filter=_fx;
    c.style.transform=_zoom===1?'':'scale('+_zoom+')';
    c.style.transformOrigin='center center';
  });
}
new MutationObserver(bmosApplyFx).observe(document.body,{childList:true,subtree:true});
function bmosFx(f,id){
  _fx=f;
  document.querySelectorAll('[id^="bf"]').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  bmosApplyFx();
}
function bmosZoom(f){_zoom=Math.min(4,Math.max(0.2,_zoom*f));bmosApplyFx();}
function bmosZoomReset(){_zoom=1;bmosApplyFx();}
function bmosFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen().catch(function(){});
}
function bmosScreenshot(){
  var c=document.querySelector('canvas');
  if(!c){bmosLog('No canvas');return;}
  try{var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='cobb-'+Date.now()+'.png';a.click();}
  catch(e){bmosLog('Shot failed: '+e.message);}
}

// ── God mode ──────────────────────────────────────────────────────────────────────
var _god=false,_godTimer=null;
function bmosToggleGod(){
  _god=!_god;
  var b=document.getElementById('bgod');
  b.classList.toggle('on',_god);
  b.textContent=_god?'❤ God ON':'❤ God Mode';
  if(_god){
    _godTimer=setInterval(function(){
      bmosMaxBar('playerHungerBar');
      bmosMaxBar('playerFreezeBar');
    },500);
    bmosLog('God mode ON');
  } else {
    clearInterval(_godTimer);
    bmosLog('God mode OFF');
  }
}
// Bars store their fill as _worldInfo._width relative to original
function bmosMaxBar(name){
  var t=bmosGetType(name); if(!t) return;
  var arr=t._instances||[];
  arr.forEach(function(i){
    try{
      var wi=i._worldInfo;
      if(wi){
        if(!i._origBarW) i._origBarW=wi._width||100;
        wi._width=i._origBarW;
      }
      if(i._sdkInst){
        // try instvar 'value' or similar
        var sdk=i._sdkInst;
        if(typeof sdk.instVars==='object'&&sdk.instVars!==null){
          if(sdk.instVars.value!==undefined) sdk.instVars.value=1;
          if(sdk.instVars.amount!==undefined) sdk.instVars.amount=100;
          if(sdk.instVars.hunger!==undefined) sdk.instVars.hunger=100;
          if(sdk.instVars.warmth!==undefined) sdk.instVars.warmth=100;
        }
      }
    }catch(e){}
  });
}

// ── Resize helper ─────────────────────────────────────────────────────────────
function bmosResize(insts,scale){
  var done=0;
  insts.forEach(function(o){
    var i=o.i;
    try{
      var sz=bmosGetSize(i);
      if(!i._origW){i._origW=sz.w;i._origH=sz.h;}
      var w=i._origW*(scale<0?1:scale),h=i._origH*(scale<0?1:scale);
      bmosSetSize(i,w,h);
      done++;
    }catch(e){}
  });
  return done;
}

// ── Hacks ─────────────────────────────────────────────────────────────────────
function bmosHack(cmd){
  if(!bmosRT()){bmosLog('Runtime not ready — get into the game first');return;}

  if(cmd==='fill_hunger'){bmosMaxBar('playerHungerBar');bmosLog('Hunger filled (0 instances = not visible yet)');return;}
  if(cmd==='fill_warmth'){bmosMaxBar('playerFreezeBar');bmosLog('Warmth filled (0 instances = not visible yet)');return;}

  if(cmd==='giant'){var n=bmosResize(bmosInsts('player'),3.5);bmosLog(n?'Player enlarged':'player not found');return;}
  if(cmd==='tiny'){var n=bmosResize(bmosInsts('player'),0.3);bmosLog(n?'Player shrunk':'player not found');return;}
  if(cmd==='norm_size'){var n=bmosResize(bmosInsts('player'),-1);bmosLog(n?'Size reset':'player not found');return;}

  if(cmd==='show_pos'){
    var pl=bmosInsts('player');
    if(!pl.length){bmosLog('player not found');return;}
    var p=bmosGetXY(pl[0].i);
    bmosLog('Player: ('+Math.round(p.x)+', '+Math.round(p.y)+')');return;
  }

  if(cmd==='tp_000'){
    var pl=bmosInsts('player');
    if(!pl.length){bmosLog('player not found');return;}
    pl.forEach(function(o){bmosSetXY(o.i,0,0);});
    bmosLog('Teleported to (0,0)');return;
  }

  if(cmd==='noclip_info'){
    var pl=bmosInsts('player');
    if(!pl.length){bmosLog('player not found');return;}
    var i=pl[0].i;
    var plat=bmosFindPlatBehavior(i);
    if(plat){
      bmosLog('Platform: maxSpd='+(plat._maxSpeed|0)+' accel='+(plat._accel|0)+' jump='+(plat._jumpStrength|0));
    } else {
      var bs=bmosBehaviors(i);
      bmosLog('Behaviors('+bs.length+'): '+bs.map(function(b,j){return j+':'+Object.keys(b).slice(0,3).join(',');}).join(' | '));
    }
    return;
  }

  if(cmd==='kill_cobb'){
    var targets=bmosInsts('flesh').concat(bmosInsts('monsterProp'));
    var k=0;
    targets.forEach(function(o){if(bmosDestroy(o.i))k++;});
    bmosLog(k?'Destroyed '+k+' Cobb':'No flesh/monsterProp instances found');return;
  }

  if(cmd==='freeze_cobb'){
    var targets=bmosInsts('flesh').concat(bmosInsts('monsterProp'));
    var f=0;
    targets.forEach(function(o){
      bmosBehaviors(o.i).forEach(function(b){
        ['_dx','_dy','_vx','_vy','_speed','_platformVx','_platformVy','_velX','_velY'].forEach(function(k){
          if(b[k]!==undefined){b[k]=0;f++;}
        });
      });
      ['_vx','_vy','_dx','_dy','_speed'].forEach(function(k){if(o.i[k]!==undefined){o.i[k]=0;f++;}});
    });
    bmosLog(targets.length?'Froze '+targets.length+' Cobb ('+f+' props)':'No Cobb found — try 0.25x speed');return;
  }

  if(cmd==='giant_cobb'){var n=bmosResize(bmosInsts('flesh').concat(bmosInsts('monsterProp')),4);bmosLog(n?'Cobb enormous':'flesh/monsterProp not found');return;}
  if(cmd==='tiny_cobb'){var n=bmosResize(bmosInsts('flesh').concat(bmosInsts('monsterProp')),0.2);bmosLog(n?'Cobb tiny':'flesh/monsterProp not found');return;}

  if(cmd==='spawn_grabbable'||cmd==='spawn_seed'){
    var typeName=cmd==='spawn_seed'?'seed':'grabbable';
    var t=bmosGetType(typeName);
    if(!t){bmosLog(typeName+' type not found');return;}
    var pl=bmosInsts('player');var px=200,py=200;
    if(pl.length){var p=bmosGetXY(pl[0].i);px=p.x+80;py=p.y;}
    var rt=bmosRT();
    try{
      var layout=rt._currentLayout||(rt._layoutManager&&rt._layoutManager._currentLayout);
      var layer=layout&&layout._layers&&layout._layers[0];
      var ni=null;
      if(typeof rt.CreateWorldInstance==='function')ni=rt.CreateWorldInstance(t,layer,px,py);
      if(!ni&&typeof t._CreateInstance==='function')ni=t._CreateInstance(layer,px,py);
      if(!ni&&t._sdkType&&typeof t._sdkType.createInstance==='function')ni=t._sdkType.createInstance(layer,px,py);
      bmosLog(ni?typeName+' spawned!':'Spawn API not found on this C3 build');
    }catch(e){bmosLog('Spawn err: '+e.message);}
    return;
  }

  if(cmd==='kill_env'){
    var envNames=['envChunk','envGrass','envPlant','envBush','envCarpet','deadProps','flesh'];
    var k=0;
    envNames.forEach(function(name){
      bmosInsts(name).slice().forEach(function(o){if(bmosDestroy(o.i))k++;});
    });
    bmosLog('Cleared '+k+' env objects');return;
  }

  if(cmd==='conveyor_fast'||cmd==='conveyor_rev'||cmd==='conveyor_stop'){
    var convs=bmosInsts('conveyor');var done=0;
    convs.forEach(function(o){
      var spd=cmd==='conveyor_stop'?0:cmd==='conveyor_fast'?600:-300;
      bmosBehaviors(o.i).forEach(function(b){
        if(b._speed!==undefined){b._speed=spd;done++;}
        if(b._scrollSpeed!==undefined){b._scrollSpeed=spd;done++;}
        if(b._rate!==undefined){b._rate=spd;done++;}
      });
      if(o.i._worldInfo&&o.i._worldInfo._speed!==undefined){o.i._worldInfo._speed=spd;done++;}
    });
    bmosLog(done?'Conveyors: '+done+' props updated':'Conveyor props not found');return;
  }
}

// ── Menu ──────────────────────────────────────────────────────────────────────
function bmosOpen(){document.getElementById('bmos-menu').classList.add('open');}
function bmosClose(){document.getElementById('bmos-menu').classList.remove('open');}
document.addEventListener('keydown',function(e){
  if(e.key==='m'||e.key==='M'){var m=document.getElementById('bmos-menu');m.classList.contains('open')?bmosClose():bmosOpen();}
  if(e.key==='Escape')bmosClose();
});
</script>
