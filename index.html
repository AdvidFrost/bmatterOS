<script>

  let deferredPrompt = null;

  const APP_HTML = '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>bmatterOS</title>\n<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">\n<style>\n  :root {\n    --bg: #0d0d0d;\n    --bg2: #141414;\n    --bg3: #1a1a1a;\n    --bg4: #222222;\n    --accent: #e53e3e;\n    --accent2: #fc5c5c;\n    --accent-dim: rgba(229,62,62,0.15);\n    --accent-glow: rgba(229,62,62,0.3);\n    --text: #e8e8e8;\n    --text2: #999;\n    --text3: #555;\n    --border: #2a2a2a;\n    --sidebar-w: 200px;\n    --topbar-h: 48px;\n    --font-ui: \'Barlow\', sans-serif;\n    --font-mono: \'Share Tech Mono\', monospace;\n    --radius: 6px;\n  }\n\n  /* THEMES */\n  [data-theme="blue"] {\n    --accent: #3b82f6; --accent2: #60a5fa;\n    --accent-dim: rgba(59,130,246,0.15);\n    --accent-glow: rgba(59,130,246,0.3);\n  }\n  [data-theme="green"] {\n    --accent: #22c55e; --accent2: #4ade80;\n    --accent-dim: rgba(34,197,94,0.15);\n    --accent-glow: rgba(34,197,94,0.3);\n  }\n  [data-theme="purple"] {\n    --accent: #a855f7; --accent2: #c084fc;\n    --accent-dim: rgba(168,85,247,0.15);\n    --accent-glow: rgba(168,85,247,0.3);\n  }\n  [data-theme="orange"] {\n    --accent: #f97316; --accent2: #fb923c;\n    --accent-dim: rgba(249,115,22,0.15);\n    --accent-glow: rgba(249,115,22,0.3);\n  }\n  [data-theme="cyan"] {\n    --accent: #06b6d4; --accent2: #22d3ee;\n    --accent-dim: rgba(6,182,212,0.15);\n    --accent-glow: rgba(6,182,212,0.3);\n  }\n  [data-theme="light"] {\n    --bg: #f5f5f5; --bg2: #ebebeb; --bg3: #e0e0e0; --bg4: #d5d5d5;\n    --text: #1a1a1a; --text2: #555; --text3: #999;\n    --border: #d0d0d0;\n    --accent: #e53e3e; --accent2: #fc5c5c;\n    --accent-dim: rgba(229,62,62,0.12);\n    --accent-glow: rgba(229,62,62,0.25);\n  }\n\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: var(--font-ui);\n    height: 100vh;\n    overflow: hidden;\n    display: flex;\n    flex-direction: column;\n  }\n\n  /* TOPBAR */\n  #topbar {\n    height: var(--topbar-h);\n    background: var(--bg2);\n    border-bottom: 1px solid var(--border);\n    display: flex;\n    align-items: center;\n    padding: 0 1rem;\n    gap: 1.5rem;\n    flex-shrink: 0;\n    position: relative;\n    z-index: 10;\n  }\n\n  .brand {\n    font-family: var(--font-mono);\n    font-size: 1rem;\n    color: var(--accent);\n    letter-spacing: 0.1em;\n    text-shadow: 0 0 12px var(--accent-glow);\n    white-space: nowrap;\n    margin-right: 0.5rem;\n  }\n\n  .brand span {\n    color: var(--text3);\n    font-size: 0.7rem;\n    margin-left: 6px;\n  }\n\n  .topnav {\n    display: flex;\n    gap: 0.25rem;\n  }\n\n  .topnav-btn {\n    background: none;\n    border: none;\n    color: var(--text2);\n    font-family: var(--font-ui);\n    font-size: 0.82rem;\n    font-weight: 500;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    padding: 0.35rem 0.85rem;\n    border-radius: var(--radius);\n    cursor: pointer;\n    transition: all 0.15s;\n  }\n\n  .topnav-btn:hover {\n    background: var(--bg3);\n    color: var(--text);\n  }\n\n  .topnav-btn.active {\n    background: var(--accent-dim);\n    color: var(--accent);\n  }\n\n  .topbar-right {\n    margin-left: auto;\n    display: flex;\n    align-items: center;\n    gap: 0.5rem;\n  }\n\n  .search-box {\n    background: var(--bg3);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    color: var(--text);\n    font-family: var(--font-ui);\n    font-size: 0.82rem;\n    padding: 0.3rem 0.75rem;\n    width: 180px;\n    outline: none;\n    transition: border-color 0.15s;\n  }\n\n  .search-box:focus {\n    border-color: var(--accent);\n  }\n\n  .search-box::placeholder { color: var(--text3); }\n\n  /* LAYOUT */\n  #layout {\n    display: flex;\n    flex: 1;\n    overflow: hidden;\n  }\n\n  /* SIDEBAR */\n  #sidebar {\n    width: var(--sidebar-w);\n    background: var(--bg2);\n    border-right: 1px solid var(--border);\n    overflow-y: auto;\n    flex-shrink: 0;\n    padding: 0.75rem 0;\n  }\n\n  #sidebar::-webkit-scrollbar { width: 4px; }\n  #sidebar::-webkit-scrollbar-track { background: transparent; }\n  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }\n\n  .sidebar-section {\n    padding: 0.5rem 0;\n  }\n\n  .sidebar-label {\n    font-size: 0.65rem;\n    font-weight: 700;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--text3);\n    padding: 0.25rem 1rem;\n    margin-bottom: 0.25rem;\n  }\n\n  .sidebar-item {\n    display: flex;\n    align-items: center;\n    gap: 0.5rem;\n    padding: 0.4rem 1rem;\n    font-size: 0.83rem;\n    color: var(--text2);\n    cursor: pointer;\n    transition: all 0.12s;\n    border-left: 2px solid transparent;\n    user-select: none;\n  }\n\n  .sidebar-item:hover {\n    background: var(--bg3);\n    color: var(--text);\n  }\n\n  .sidebar-item.active {\n    color: var(--accent);\n    border-left-color: var(--accent);\n    background: var(--accent-dim);\n  }\n\n  .sidebar-dot {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--text3);\n    flex-shrink: 0;\n  }\n\n  .sidebar-item.active .sidebar-dot {\n    background: var(--accent);\n    box-shadow: 0 0 6px var(--accent-glow);\n  }\n\n  /* MAIN */\n  #main {\n    flex: 1;\n    overflow: hidden;\n    position: relative;\n  }\n\n  .tab-panel {\n    display: none;\n    height: 100%;\n    overflow-y: auto;\n    padding: 1.5rem;\n  }\n\n  .tab-panel.active { display: block; }\n\n  .tab-panel::-webkit-scrollbar { width: 6px; }\n  .tab-panel::-webkit-scrollbar-track { background: transparent; }\n  .tab-panel::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }\n\n  /* HOME TAB */\n  .home-header {\n    margin-bottom: 1.5rem;\n  }\n\n  .home-header h1 {\n    font-size: 1.6rem;\n    font-weight: 700;\n    color: var(--text);\n    margin-bottom: 0.25rem;\n  }\n\n  .home-header p {\n    color: var(--text2);\n    font-size: 0.88rem;\n  }\n\n  .changelog-card {\n    background: var(--bg2);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    padding: 1.25rem;\n    margin-bottom: 1rem;\n  }\n\n  .changelog-version {\n    font-family: var(--font-mono);\n    font-size: 0.85rem;\n    color: var(--accent);\n    margin-bottom: 0.25rem;\n  }\n\n  .changelog-date {\n    font-size: 0.75rem;\n    color: var(--text3);\n    margin-bottom: 0.75rem;\n  }\n\n  .changelog-card ul {\n    list-style: none;\n    display: flex;\n    flex-direction: column;\n    gap: 0.4rem;\n  }\n\n  .changelog-card li {\n    font-size: 0.85rem;\n    color: var(--text2);\n    padding-left: 1rem;\n    position: relative;\n  }\n\n  .changelog-card li::before {\n    content: \'›\';\n    position: absolute;\n    left: 0;\n    color: var(--accent);\n  }\n\n  .section-title {\n    font-size: 0.7rem;\n    font-weight: 700;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--text3);\n    margin-bottom: 1rem;\n    padding-bottom: 0.5rem;\n    border-bottom: 1px solid var(--border);\n  }\n\n  .featured-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));\n    gap: 0.75rem;\n    margin-bottom: 1.5rem;\n  }\n\n  .featured-card {\n    background: var(--bg2);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    padding: 1rem;\n    cursor: pointer;\n    transition: all 0.15s;\n    display: flex;\n    flex-direction: column;\n    gap: 0.5rem;\n  }\n\n  .featured-card:hover {\n    border-color: var(--accent);\n    background: var(--bg3);\n  }\n\n  .featured-icon {\n    font-size: 1.5rem;\n  }\n\n  .featured-name {\n    font-size: 0.85rem;\n    font-weight: 600;\n    color: var(--text);\n  }\n\n  .featured-desc {\n    font-size: 0.75rem;\n    color: var(--text2);\n  }\n\n  /* GAMES TAB */\n  .games-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));\n    gap: 0.75rem;\n    margin-bottom: 1.5rem;\n  }\n\n  .game-card {\n    background: var(--bg2);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    overflow: hidden;\n    cursor: pointer;\n    transition: all 0.15s;\n    position: relative;\n  }\n\n  .game-card:hover {\n    border-color: var(--accent);\n    transform: translateY(-2px);\n  }\n\n  .game-thumb {\n    width: 100%;\n    height: 110px;\n    background: var(--bg3);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 2.5rem;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .game-thumb::after {\n    content: \'\';\n    position: absolute;\n    bottom: 0; left: 0; right: 0;\n    height: 40px;\n    background: linear-gradient(transparent, var(--bg2));\n  }\n\n  .game-info {\n    padding: 0.6rem 0.75rem;\n  }\n\n  .game-name {\n    font-size: 0.85rem;\n    font-weight: 600;\n    color: var(--text);\n    margin-bottom: 0.15rem;\n  }\n\n  .game-tag {\n    font-size: 0.7rem;\n    color: var(--accent);\n    font-family: var(--font-mono);\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n  }\n\n  /* IFRAME OVERLAY */\n  #game-overlay {\n    display: none;\n    position: fixed;\n    top: 0; left: 0; right: 0; bottom: 0;\n    background: var(--bg);\n    z-index: 100;\n    flex-direction: column;\n  }\n\n  #game-overlay.open { display: flex; }\n\n  .overlay-bar {\n    height: 40px;\n    background: var(--bg2);\n    border-bottom: 1px solid var(--border);\n    display: flex;\n    align-items: center;\n    padding: 0 1rem;\n    gap: 0.75rem;\n    flex-shrink: 0;\n  }\n\n  .overlay-title {\n    font-size: 0.85rem;\n    font-weight: 600;\n    color: var(--text);\n    flex: 1;\n  }\n\n  .overlay-close {\n    background: none;\n    border: 1px solid var(--border);\n    color: var(--text2);\n    font-size: 0.8rem;\n    padding: 0.2rem 0.6rem;\n    border-radius: 4px;\n    cursor: pointer;\n    font-family: var(--font-ui);\n    transition: all 0.12s;\n  }\n\n  .overlay-close:hover {\n    border-color: var(--accent);\n    color: var(--accent);\n  }\n\n  #game-frame {\n    flex: 1;\n    border: none;\n    width: 100%;\n  }\n\n  /* TIC TAC TOE */\n  .ttt-wrap {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    padding: 1.5rem;\n    height: 100%;\n  }\n\n  .ttt-status {\n    font-size: 1rem;\n    font-weight: 600;\n    color: var(--text);\n    margin-bottom: 1.25rem;\n    font-family: var(--font-mono);\n  }\n\n  .ttt-status span { color: var(--accent); }\n\n  .ttt-board {\n    display: grid;\n    grid-template-columns: repeat(3, 100px);\n    grid-template-rows: repeat(3, 100px);\n    gap: 6px;\n  }\n\n  .ttt-cell {\n    background: var(--bg3);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 2.2rem;\n    font-weight: 900;\n    cursor: pointer;\n    transition: all 0.12s;\n    user-select: none;\n  }\n\n  .ttt-cell:hover:not(.filled) {\n    background: var(--bg4);\n    border-color: var(--accent);\n  }\n\n  .ttt-cell.x { color: var(--accent); }\n  .ttt-cell.o { color: var(--text2); }\n  .ttt-cell.win { background: var(--accent-dim); border-color: var(--accent); }\n\n  .ttt-reset {\n    margin-top: 1.25rem;\n    background: none;\n    border: 1px solid var(--border);\n    color: var(--text2);\n    font-family: var(--font-ui);\n    font-size: 0.82rem;\n    padding: 0.4rem 1.2rem;\n    border-radius: var(--radius);\n    cursor: pointer;\n    transition: all 0.12s;\n    letter-spacing: 0.05em;\n  }\n\n  .ttt-reset:hover {\n    border-color: var(--accent);\n    color: var(--accent);\n  }\n\n  .score-row {\n    display: flex;\n    gap: 1.5rem;\n    margin-bottom: 1rem;\n    font-family: var(--font-mono);\n    font-size: 0.85rem;\n    color: var(--text3);\n  }\n\n  .score-row span { color: var(--accent); font-weight: 700; }\n\n  /* SETTINGS TAB */\n  .settings-section {\n    background: var(--bg2);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    padding: 1.25rem;\n    margin-bottom: 1rem;\n  }\n\n  .settings-section h3 {\n    font-size: 0.8rem;\n    font-weight: 700;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--text3);\n    margin-bottom: 1rem;\n    padding-bottom: 0.5rem;\n    border-bottom: 1px solid var(--border);\n  }\n\n  .setting-row {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 0.5rem 0;\n  }\n\n  .setting-label {\n    font-size: 0.88rem;\n    color: var(--text);\n  }\n\n  .setting-desc {\n    font-size: 0.75rem;\n    color: var(--text3);\n    margin-top: 0.1rem;\n  }\n\n  .theme-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));\n    gap: 0.5rem;\n    margin-top: 0.75rem;\n  }\n\n  .theme-btn {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 0.4rem;\n    padding: 0.6rem 0.5rem;\n    background: var(--bg3);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    cursor: pointer;\n    transition: all 0.12s;\n    font-family: var(--font-ui);\n    font-size: 0.72rem;\n    color: var(--text2);\n  }\n\n  .theme-btn:hover { border-color: var(--text3); }\n\n  .theme-btn.active {\n    border-color: var(--accent);\n    color: var(--accent);\n    background: var(--accent-dim);\n  }\n\n  .theme-dot {\n    width: 18px; height: 18px;\n    border-radius: 50%;\n  }\n\n  .toggle {\n    position: relative;\n    width: 40px; height: 22px;\n    cursor: pointer;\n  }\n\n  .toggle input { display: none; }\n\n  .toggle-track {\n    width: 100%; height: 100%;\n    background: var(--bg4);\n    border-radius: 11px;\n    border: 1px solid var(--border);\n    transition: all 0.2s;\n    position: absolute;\n  }\n\n  .toggle input:checked + .toggle-track {\n    background: var(--accent-dim);\n    border-color: var(--accent);\n  }\n\n  .toggle-thumb {\n    width: 16px; height: 16px;\n    background: var(--text3);\n    border-radius: 50%;\n    position: absolute;\n    top: 3px; left: 3px;\n    transition: all 0.2s;\n    pointer-events: none;\n  }\n\n  .toggle input:checked ~ .toggle-thumb {\n    transform: translateX(18px);\n    background: var(--accent);\n  }\n\n  select.setting-select {\n    background: var(--bg3);\n    border: 1px solid var(--border);\n    color: var(--text);\n    font-family: var(--font-ui);\n    font-size: 0.82rem;\n    padding: 0.3rem 0.6rem;\n    border-radius: var(--radius);\n    outline: none;\n    cursor: pointer;\n  }\n\n  select.setting-select:focus { border-color: var(--accent); }\n\n  .about-box {\n    font-family: var(--font-mono);\n    font-size: 0.78rem;\n    color: var(--text3);\n    line-height: 1.9;\n  }\n\n  .about-box span { color: var(--accent); }\n</style>\n</head>\n<body>\n\n<!-- TOPBAR -->\n<div id="topbar">\n  <div class="brand">bmatterOS <span>v1.0.0</span></div>\n  <nav class="topnav">\n    <button class="topnav-btn active" onclick="switchTab(\'home\')">Home</button>\n    <button class="topnav-btn" onclick="switchTab(\'games\')">Games</button>\n    <button class="topnav-btn" onclick="switchTab(\'settings\')">Settings</button>\n  </nav>\n  <div class="topbar-right">\n    <input type="text" class="search-box" placeholder="Search games..." oninput="filterGames(this.value)" id="searchbox">\n  </div>\n</div>\n\n<!-- LAYOUT -->\n<div id="layout">\n\n  <!-- SIDEBAR -->\n  <div id="sidebar">\n    <div class="sidebar-section" id="sidebar-content">\n      <!-- populated by JS -->\n    </div>\n  </div>\n\n  <!-- MAIN CONTENT -->\n  <div id="main">\n\n    <!-- HOME TAB -->\n    <div class="tab-panel active" id="tab-home">\n      <div class="home-header">\n        <h1>Welcome back.</h1>\n        <p>bmatterOS — your personal game portal</p>\n      </div>\n\n      <div class="section-title">What\'s New</div>\n      <div class="changelog-card">\n        <div class="changelog-version">v1.0.0</div>\n        <div class="changelog-date">Initial Release</div>\n        <ul>\n          <li>bmatterOS launched</li>\n          <li>Dark red theme with 5 alternate color themes</li>\n          <li>Games tab with Tic-Tac-Toe built in</li>\n          <li>Settings with theme switcher and toggles</li>\n          <li>PWA install + about:blank cloaking</li>\n        </ul>\n      </div>\n\n      <div class="section-title" style="margin-top:1.5rem">Quick Launch</div>\n      <div class="featured-grid" id="featured-grid">\n        <!-- populated by JS -->\n      </div>\n    </div>\n\n    <!-- GAMES TAB -->\n    <div class="tab-panel" id="tab-games">\n      <div class="section-title">All Games</div>\n      <div class="games-grid" id="games-grid">\n        <!-- populated by JS -->\n      </div>\n    </div>\n\n    <!-- SETTINGS TAB -->\n    <div class="tab-panel" id="tab-settings">\n      <div class="section-title">Settings</div>\n\n      <div class="settings-section">\n        <h3>Appearance</h3>\n        <div>\n          <div class="setting-label" style="margin-bottom:0.25rem">Color Theme</div>\n          <div class="setting-desc" style="margin-bottom:0.75rem">Choose your accent color</div>\n          <div class="theme-grid">\n            <button class="theme-btn active" onclick="setTheme(\'red\')" id="theme-red">\n              <div class="theme-dot" style="background:#e53e3e"></div>Red\n            </button>\n            <button class="theme-btn" onclick="setTheme(\'blue\')" id="theme-blue">\n              <div class="theme-dot" style="background:#3b82f6"></div>Blue\n            </button>\n            <button class="theme-btn" onclick="setTheme(\'green\')" id="theme-green">\n              <div class="theme-dot" style="background:#22c55e"></div>Green\n            </button>\n            <button class="theme-btn" onclick="setTheme(\'purple\')" id="theme-purple">\n              <div class="theme-dot" style="background:#a855f7"></div>Purple\n            </button>\n            <button class="theme-btn" onclick="setTheme(\'orange\')" id="theme-orange">\n              <div class="theme-dot" style="background:#f97316"></div>Orange\n            </button>\n            <button class="theme-btn" onclick="setTheme(\'cyan\')" id="theme-cyan">\n              <div class="theme-dot" style="background:#06b6d4"></div>Cyan\n            </button>\n            <button class="theme-btn" onclick="setTheme(\'light\')" id="theme-light">\n              <div class="theme-dot" style="background:#f5f5f5;border:1px solid #ccc"></div>Light\n            </button>\n          </div>\n        </div>\n      </div>\n\n      <div class="settings-section">\n        <h3>Interface</h3>\n        <div class="setting-row">\n          <div>\n            <div class="setting-label">Show Sidebar</div>\n            <div class="setting-desc">Toggle left sidebar visibility</div>\n          </div>\n          <label class="toggle">\n            <input type="checkbox" checked onchange="toggleSidebar(this.checked)">\n            <div class="toggle-track"></div>\n            <div class="toggle-thumb"></div>\n          </label>\n        </div>\n        <div class="setting-row">\n          <div>\n            <div class="setting-label">Compact Mode</div>\n            <div class="setting-desc">Reduce padding and spacing</div>\n          </div>\n          <label class="toggle">\n            <input type="checkbox" onchange="toggleCompact(this.checked)">\n            <div class="toggle-track"></div>\n            <div class="toggle-thumb"></div>\n          </label>\n        </div>\n      </div>\n\n      <div class="settings-section">\n        <h3>About</h3>\n        <div class="about-box">\n          <div>System: <span>bmatterOS</span></div>\n          <div>Version: <span>v1.0.0</span></div>\n          <div>Engine: <span>Chromium / PWA</span></div>\n          <div>Cloak: <span>about:blank injector</span></div>\n          <div>Hosting: <span>Cloudflare Pages</span></div>\n        </div>\n      </div>\n    </div>\n\n  </div>\n</div>\n\n<!-- GAME OVERLAY -->\n<div id="game-overlay">\n  <div class="overlay-bar">\n    <div class="overlay-title" id="overlay-title">Game</div>\n    <button class="overlay-close" onclick="closeGame()">✕ Close</button>\n  </div>\n  <div id="game-content" style="flex:1;overflow:hidden;">\n    <!-- iframe or built-in game rendered here -->\n  </div>\n</div>\n\n<script>\nconst GAMES = [\n  {\n    id: \'tictactoe\',\n    name: \'Tic-Tac-Toe\',\n    emoji: \'⚔️\',\n    tag: \'built-in\',\n    type: \'builtin\',\n    desc: \'Classic X vs O strategy game\'\n  },\n  // ADD MORE GAMES HERE LATER:\n  // { id: \'drifthunters\', name: \'Drift Hunters\', emoji: \'🚗\', tag: \'racing\', type: \'iframe\', url: \'https://...\' },\n];\n\nlet currentTab = \'home\';\nlet scores = { X: 0, O: 0, draws: 0 };\n\nfunction switchTab(tab) {\n  currentTab = tab;\n  document.querySelectorAll(\'.tab-panel\').forEach(p => p.classList.remove(\'active\'));\n  document.querySelectorAll(\'.topnav-btn\').forEach(b => b.classList.remove(\'active\'));\n  document.getElementById(\'tab-\' + tab).classList.add(\'active\');\n  document.querySelectorAll(\'.topnav-btn\').forEach(b => {\n    if (b.textContent.toLowerCase() === tab) b.classList.add(\'active\');\n  });\n  buildSidebar(tab);\n  if (tab === \'games\') document.getElementById(\'searchbox\').style.display = \'\';\n  else document.getElementById(\'searchbox\').style.display = \'none\';\n}\n\nfunction buildSidebar(tab) {\n  const s = document.getElementById(\'sidebar-content\');\n  s.innerHTML = \'\';\n  if (tab === \'home\') {\n    s.innerHTML = `\n      <div class="sidebar-label">Navigation</div>\n      <div class="sidebar-item active" onclick="switchTab(\'home\')"><div class="sidebar-dot"></div>Home</div>\n      <div class="sidebar-item" onclick="switchTab(\'games\')"><div class="sidebar-dot"></div>Games</div>\n      <div class="sidebar-item" onclick="switchTab(\'settings\')"><div class="sidebar-dot"></div>Settings</div>\n    `;\n  } else if (tab === \'games\') {\n    let html = \'<div class="sidebar-label">Categories</div>\';\n    html += `<div class="sidebar-item active"><div class="sidebar-dot"></div>All Games</div>`;\n    html += `<div class="sidebar-item"><div class="sidebar-dot"></div>Built-in</div>`;\n    html += `<div class="sidebar-item"><div class="sidebar-dot"></div>Arcade</div>`;\n    html += `<div class="sidebar-item"><div class="sidebar-dot"></div>Racing</div>`;\n    html += `<div class="sidebar-item"><div class="sidebar-dot"></div>Shooting</div>`;\n    s.innerHTML = html;\n  } else if (tab === \'settings\') {\n    s.innerHTML = `\n      <div class="sidebar-label">Settings</div>\n      <div class="sidebar-item active"><div class="sidebar-dot"></div>Appearance</div>\n      <div class="sidebar-item"><div class="sidebar-dot"></div>Interface</div>\n      <div class="sidebar-item"><div class="sidebar-dot"></div>About</div>\n    `;\n  }\n}\n\nfunction buildGamesGrid(filter) {\n  const grid = document.getElementById(\'games-grid\');\n  const filtered = filter\n    ? GAMES.filter(g => g.name.toLowerCase().includes(filter.toLowerCase()))\n    : GAMES;\n  grid.innerHTML = filtered.map(g => `\n    <div class="game-card" onclick="openGame(\'${g.id}\')">\n      <div class="game-thumb">${g.emoji}</div>\n      <div class="game-info">\n        <div class="game-name">${g.name}</div>\n        <div class="game-tag">${g.tag}</div>\n      </div>\n    </div>\n  `).join(\'\');\n}\n\nfunction buildFeatured() {\n  const grid = document.getElementById(\'featured-grid\');\n  grid.innerHTML = GAMES.slice(0,4).map(g => `\n    <div class="featured-card" onclick="switchTab(\'games\');openGame(\'${g.id}\')">\n      <div class="featured-icon">${g.emoji}</div>\n      <div class="featured-name">${g.name}</div>\n      <div class="featured-desc">${g.desc}</div>\n    </div>\n  `).join(\'\');\n}\n\nfunction filterGames(val) {\n  buildGamesGrid(val);\n}\n\nfunction openGame(id) {\n  const game = GAMES.find(g => g.id === id);\n  if (!game) return;\n  document.getElementById(\'overlay-title\').textContent = game.name;\n  const content = document.getElementById(\'game-content\');\n  if (game.type === \'iframe\') {\n    content.innerHTML = `<iframe src="${game.url}" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>`;\n  } else if (game.type === \'builtin\' && id === \'tictactoe\') {\n    content.innerHTML = buildTTT();\n    initTTT();\n  }\n  document.getElementById(\'game-overlay\').classList.add(\'open\');\n}\n\nfunction closeGame() {\n  document.getElementById(\'game-overlay\').classList.remove(\'open\');\n  document.getElementById(\'game-content\').innerHTML = \'\';\n}\n\n// TIC TAC TOE\nfunction buildTTT() {\n  return `\n    <div class="ttt-wrap">\n      <div class="score-row">\n        X wins: <span id="sx">0</span>\n        &nbsp;·&nbsp;\n        O wins: <span id="so">0</span>\n        &nbsp;·&nbsp;\n        Draws: <span id="sd">0</span>\n      </div>\n      <div class="ttt-status" id="ttt-status">Your turn — <span>X</span></div>\n      <div class="ttt-board" id="ttt-board">\n        ${Array(9).fill(0).map((_,i) => `<div class="ttt-cell" id="c${i}" onclick="tttClick(${i})"></div>`).join(\'\')}\n      </div>\n      <button class="ttt-reset" onclick="tttReset()">New Game</button>\n    </div>\n  `;\n}\n\nlet tttBoard, tttTurn, tttDone;\nconst WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];\n\nfunction initTTT() {\n  tttBoard = Array(9).fill(\'\');\n  tttTurn = \'X\';\n  tttDone = false;\n  // restore scores\n  const sx = document.getElementById(\'sx\');\n  const so = document.getElementById(\'so\');\n  const sd = document.getElementById(\'sd\');\n  if (sx) { sx.textContent = scores.X; so.textContent = scores.O; sd.textContent = scores.draws; }\n}\n\nfunction tttClick(i) {\n  if (tttDone || tttBoard[i]) return;\n  tttBoard[i] = tttTurn;\n  const cell = document.getElementById(\'c\' + i);\n  cell.textContent = tttTurn;\n  cell.classList.add(\'filled\', tttTurn.toLowerCase());\n\n  const win = WINS.find(w => w.every(j => tttBoard[j] === tttTurn));\n  if (win) {\n    win.forEach(j => document.getElementById(\'c\' + j).classList.add(\'win\'));\n    document.getElementById(\'ttt-status\').innerHTML = `<span>${tttTurn}</span> wins!`;\n    scores[tttTurn]++;\n    document.getElementById(\'s\' + tttTurn.toLowerCase()).textContent = scores[tttTurn];\n    tttDone = true;\n    return;\n  }\n  if (tttBoard.every(c => c)) {\n    document.getElementById(\'ttt-status\').innerHTML = `Draw!`;\n    scores.draws++;\n    document.getElementById(\'sd\').textContent = scores.draws;\n    tttDone = true;\n    return;\n  }\n  tttTurn = tttTurn === \'X\' ? \'O\' : \'X\';\n  document.getElementById(\'ttt-status\').innerHTML = `Your turn — <span>${tttTurn}</span>`;\n}\n\nfunction tttReset() {\n  tttBoard = Array(9).fill(\'\');\n  tttTurn = \'X\';\n  tttDone = false;\n  for (let i = 0; i < 9; i++) {\n    const c = document.getElementById(\'c\' + i);\n    if (c) { c.textContent = \'\'; c.className = \'ttt-cell\'; c.onclick = () => tttClick(i); }\n  }\n  document.getElementById(\'ttt-status\').innerHTML = `Your turn — <span>X</span>`;\n}\n\n// SETTINGS\nfunction setTheme(theme) {\n  document.body.setAttribute(\'data-theme\', theme === \'red\' ? \'\' : theme);\n  document.querySelectorAll(\'.theme-btn\').forEach(b => b.classList.remove(\'active\'));\n  document.getElementById(\'theme-\' + theme).classList.add(\'active\');\n  try { localStorage.setItem(\'bmos-theme\', theme); } catch(e) {}\n}\n\nfunction toggleSidebar(on) {\n  document.getElementById(\'sidebar\').style.display = on ? \'\' : \'none\';\n}\n\nfunction toggleCompact(on) {\n  document.body.style.setProperty(\'--topbar-h\', on ? \'40px\' : \'48px\');\n  document.querySelectorAll(\'.tab-panel\').forEach(p => {\n    p.style.padding = on ? \'1rem\' : \'1.5rem\';\n  });\n}\n\n// INIT\n(function init() {\n  buildGamesGrid();\n  buildFeatured();\n  buildSidebar(\'home\');\n  document.getElementById(\'searchbox\').style.display = \'none\';\n\n  try {\n    const saved = localStorage.getItem(\'bmos-theme\');\n    if (saved) setTheme(saved);\n  } catch(e) {}\n})();\n<\\/script>\n</body>\n</html>\n';

  async function runInjection() {
    const newWin = window.open('about:blank#bmatteros', '_blank',
      'width=' + screen.availWidth + ',height=' + screen.availHeight + ',menubar=yes,status=yes,location=yes'
    );
    if (!newWin) return;
    newWin.document.open();
    newWin.document.write(APP_HTML);
    newWin.document.close();
    window.open('', '_self');
    window.close();
  }

  async function tryInstallPrompt() {
    if (promptAttempted || !deferredPrompt) return;
    promptAttempted = true;
    try {
      await deferredPrompt.prompt();
      await deferredPrompt.userChoice;
    } catch(e) {
    } finally {
      deferredPrompt = null;
      removePromptListeners();
    }
  }

  function addPromptListeners() {
    window.addEventListener('click', tryInstallPrompt, { once: true });
    window.addEventListener('keydown', tryInstallPrompt, { once: true });
    window.addEventListener('touchstart', tryInstallPrompt, { once: true });
  }

  function removePromptListeners() {
    window.removeEventListener('click', tryInstallPrompt);
    window.removeEventListener('keydown', tryInstallPrompt);
    window.removeEventListener('touchstart', tryInstallPrompt);
  }

  if (!isPWA) {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      addPromptListeners();
    });
  }

  if (isPWA) {
    runInjection();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
<\/script>
