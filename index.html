<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="icon" href="/icon-192.png" type="image/png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <title>bmatterOS</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
  </style>
</head>
<body>
<script>
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  let deferredPrompt = null;
  let promptAttempted = false;

  async function runInjection() {
    const newWin = window.open('about:blank#bmatter', '_blank',
      'width=' + screen.availWidth + ',height=' + screen.availHeight + ',menubar=yes,status=yes,location=yes'
    );
    if (!newWin) return;
    newWin.document.open();
    newWin.document.write(`
      <!doctype html>
      <html>
      <head>
        <meta charset="utf-8">
        <title>bmatterOS</title>
        <style>
          html, body { margin: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
        </style>
      </head>
      <body>
        <script>
          (async () => {
            try {
              const res = await fetch('/app.html?t=' + Date.now(), { cache: 'no-store' });
              const html = await res.text();
              document.open();
              document.write(html);
              document.close();
            } catch(e) {
              location.href = '/app.html';
            }
          })();
        <\/script>
      </body>
      </html>
    `);
    newWin.document.close();
    window.open('', '_self');
    window.close();
  }

  async function tryInstallPrompt() {
    if (promptAttempted || !deferredPrompt) return;
    promptAttempted = true;
    try {
      await deferredPrompt.prompt();
      await deferredPrompt.userChoice;
    } catch(e) {
    } finally {
      deferredPrompt = null;
      removePromptListeners();
    }
  }

  function addPromptListeners() {
    window.addEventListener('click', tryInstallPrompt, { once: true });
    window.addEventListener('keydown', tryInstallPrompt, { once: true });
    window.addEventListener('touchstart', tryInstallPrompt, { once: true });
  }

  function removePromptListeners() {
    window.removeEventListener('click', tryInstallPrompt);
    window.removeEventListener('keydown', tryInstallPrompt);
    window.removeEventListener('touchstart', tryInstallPrompt);
  }

  if (!isPWA) {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      addPromptListeners();
    });
  }

  if (isPWA) {
    runInjection();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
