<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="icon" href="./icon-192.png" type="image/png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000">
  <title>bmatterOS</title>
  <style>
    html, body { margin:0; width:100%; height:100%; background:#000; overflow:hidden; }
  </style>
</head>
<body>
<script>
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  let deferredPrompt = null;
  let promptAttempted = false;

  const BASE_URL = 'https://bmatteros.pages.dev/';

  // Window size: wide rectangle, about 55% width x 45% height
  const W = Math.round(screen.availWidth * 0.55);
  const H = Math.round(screen.availHeight * 0.45);
  const L = Math.round((screen.availWidth - W) / 2);
  const T = Math.round((screen.availHeight - H) / 2);
  const FEATS = `width=${W},height=${H},left=${L},top=${T},menubar=yes,status=yes,location=yes`;

  async function runInjection() {

    // STEP 1: Open loading window at about:blank
    const loadWin = window.open('about:blank#bmatteros-loading', '_blank', FEATS);
    if (!loadWin) return;

    // Write terminal loader into it
    loadWin.document.open();
    loadWin.document.write(`<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>&#8203;</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#0a0a0a; overflow:hidden; }
#tl { width:100%; height:100%; background:#0a0a0a; color:#ccc; font-family:'Courier New',monospace; font-size:12px; padding:16px; overflow-y:auto; }
.ln { margin-bottom:3px; line-height:1.5; }
.red { color:#e53e3e; }
.cur { display:inline-block; width:7px; height:12px; background:#e53e3e; vertical-align:middle; animation:bl 0.8s infinite; }
@keyframes bl { 0%,100%{opacity:1}50%{opacity:0} }
</style>
</head>
<body>
<div id="tl"><div id="tc"></div><div class="ln">C:\\Users\\bmatter&gt; <span class="cur"></span></div></div>
<script>
const tc = document.getElementById('tc');
const tl = document.getElementById('tl');
const BASE = '${BASE_URL}';
const W = ${W}, H = ${H}, L = ${L}, T = ${T};
const FEATS = 'width='+W+',height='+H+',left='+L+',top='+T+',menubar=yes,status=yes,location=yes';
const items = ['core.sys','renderer.js','theme.engine','sidebar.nav','games.registry','tictactoe.mod','settings.cfg','ui.framework','session.init','cloak.ready'];
const delay = ms => new Promise(r => setTimeout(r, ms));

function add(html) {
  const d = document.createElement('div');
  d.className = 'ln'; d.innerHTML = html;
  tc.appendChild(d); tl.scrollTop = 99999;
}

async function run() {
  add('bmatterOS Terminal [v1.0.0]');
  add('(c) bmatterOS. All rights reserved.<br>');
  await delay(100);
  add('C:\\\\Users\\\\bmatter&gt; <span class="red">bmatteros --init</span>');
  await delay(150);
  add('Initializing system modules...<br>');
  for (const item of items) {
    await delay(160);
    add('FETCHED [' + item + '] -&gt; <span class="red">READY</span>');
  }
  await delay(300);
  add('<br><span class="red">All systems ready. Launching bmatterOS...</span>');
  await delay(500);

  // Fetch app.html content
  let html = null;
  try {
    const r = await fetch(BASE + 'app.html?t=' + Date.now(), { cache: 'no-store' });
    html = await r.text();
    // Remove the terminal loader section from app.html since we already showed it
    html = html.replace(/<div id="terminal-loader"[\s\S]*?<\/div>\s*(?=<div id="app")/, '');
    // Make app visible immediately (skip runLoader)
    html = html.replace('runLoader();', '');
    html = html.replace("document.getElementById('terminal-loader').style.display = 'none';", '');
    html = html.replace("document.getElementById('app').classList.add('visible');", '');
    html = html.replace("#app { display:none;", '#app { display:flex;');
    html = html.replace("#app.visible { display:flex; }", '');
  } catch(e) { html = null; }

  // STEP 2: Open final about:blank app window
  const appWin = window.open('about:blank#bmatteros', '_blank', FEATS);
  if (!appWin) { location.href = BASE + 'app.html'; return; }

  appWin.document.open();
  if (html) {
    appWin.document.write('<base href="' + BASE + '">' + html);
  } else {
    appWin.document.write('<script>(async()=>{const r=await fetch("' + BASE + 'app.html");const h=await r.text();document.open();document.write(\'<base href="' + BASE + '">\'+h);document.close();})();<\\/script>');
  }
  appWin.document.close();

  // Close the loading window
  window.open('', '_self');
  window.close();
}

run();
<\/script>
</body>
</html>`);
    loadWin.document.close();

    // Close PWA window
    window.open('', '_self');
    window.close();
  }

  async function tryInstallPrompt() {
    if (promptAttempted || !deferredPrompt) return;
    promptAttempted = true;
    try {
      await deferredPrompt.prompt();
      await deferredPrompt.userChoice;
    } catch(e) {
    } finally {
      deferredPrompt = null;
      removePromptListeners();
    }
  }

  function addPromptListeners() {
    window.addEventListener('click', tryInstallPrompt, { once: true });
    window.addEventListener('keydown', tryInstallPrompt, { once: true });
    window.addEventListener('touchstart', tryInstallPrompt, { once: true });
  }

  function removePromptListeners() {
    window.removeEventListener('click', tryInstallPrompt);
    window.removeEventListener('keydown', tryInstallPrompt);
    window.removeEventListener('touchstart', tryInstallPrompt);
  }

  if (!isPWA) {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      addPromptListeners();
    });
  }

  if (isPWA) {
    runInjection();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
